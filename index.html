          </div>` : ''}
        </div>
        ${clienteSel ? `<div class="card" style="padding:9px 14px;font-weight:700;font-size:13.5px;display:flex;align-items:center;gap:8px;background:var(--paper-dim);border:none;">${clienteSel.nombre}<span data-clear-cliente title="Cambiar cliente" style="cursor:pointer;color:var(--ink-fade);font-weight:800;">×</span></div>` : `<div class="section-sub">Busca y selecciona un cliente para ver o registrar sus sesiones.</div>`}
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        ${isAdmin ? `<button class="btn btn-outline btn-sm" id="btnExportExcel" ${disabledAttr}><span style="width:14px;height:14px;display:inline-flex">${ICONS.download}</span>Exportar Excel</button>` : ''}
        <button class="btn btn-dark btn-sm" id="btnAddRegistro" ${disabledAttr}><span style="width:14px;height:14px;display:inline-flex">${ICONS.plus}</span>Nuevo registro</button>
        ${isAdmin ? `<button class="btn btn-primary btn-sm" id="btnGenInvoice" ${disabledAttr}><span style="width:14px;height:14px;display:inline-flex">${ICONS.file}</span>Generar cuenta de cobro</button>` : ''}
      </div>
    </div>
    <div class="card fade-up" style="padding:6px;">
      ${clienteSel ? `
      <div class="table-wrap">
        <table id="tablaRegistro"></table>
      </div>` : `<div style="padding:40px;text-align:center;color:var(--ink-fade);">Aún no has buscado un cliente. Escribe su nombre arriba para ver o crear sus registros de sesión.</div>`}
    </div>
  `;
  document.getElementById('regClienteSearch').addEventListener('input', e=>{
    registroClienteSearch = e.target.value;
    reRenderPreserveFocus(renderRegistro, 'regClienteSearch');
  });
  document.querySelectorAll('[data-pick-cliente]').forEach(x=>{
    x.addEventListener('click', ()=>{
      selectedClienteRegistro = x.dataset.pickCliente;
      registroClienteSearch = '';
      renderRegistro();
      saveSession();
      const clientePicked = CLIENTES.find(c=>c.id===selectedClienteRegistro);
      if(clientePicked) pullRegistrosForCliente(clientePicked).catch(e=>console.warn('Drive sync falló (se sigue usando lo local):', e));
    });
  });
  const clearBtn = document.querySelector('[data-clear-cliente]');
  if(clearBtn) clearBtn.addEventListener('click', ()=>{ selectedClienteRegistro = null; registroClienteSearch=''; renderRegistro(); saveSession(); });
  if(clienteSel){
    document.getElementById('btnAddRegistro').addEventListener('click', openAddRegistroModal);
    if(isAdmin){
      document.getElementById('btnExportExcel').addEventListener('click', ()=>exportRegistroExcel(selectedClienteRegistro));
      document.getElementById('btnGenInvoice').addEventListener('click', ()=>openInvoiceModal(selectedClienteRegistro));
    }
    renderTablaRegistro();
    // Al volver/entrar a Sesiones con un cliente ya seleccionado (recarga de página, cambio de
    // módulo, sesión restaurada), se trae lo que otro profesor haya registrado desde otro equipo.
    // pullRegistrosForCliente ya se auto-limita con driveConnected y no hace nada si Drive no está
    // conectado, así que esto es un no-op inofensivo en el estado actual (Drive aún sin configurar).
    pullRegistrosForCliente(clienteSel).catch(e=>console.warn('Drive sync falló (se sigue usando lo local):', e));
  }
}

function renderTablaRegistro(){
  const isAdmin = STATE.user.rol==='admin';
  const rows = REGISTROS.filter(r=>r.clienteId===selectedClienteRegistro).sort((a,b)=>a.fecha.localeCompare(b.fecha));
  const tbl = document.getElementById('tablaRegistro');
  const naTag = `<span style="color:var(--ink-fade);font-style:italic;">No aplica</span>`;
  const dash = `<span style="color:var(--ink-fade);">—</span>`;
  const cellFor = (naFlag,v) => naFlag ? naTag : (v===undefined||v===null||v==='') ? dash : v;
  tbl.innerHTML = `
    <thead>
      <tr>
        <th rowspan="2">#</th><th rowspan="2">Fecha</th><th rowspan="2">Profesor</th><th rowspan="2">Modalidad</th><th rowspan="2">Estado</th>
        <th colspan="4" style="text-align:center;background:var(--teal-light);color:var(--teal-dark);">Inicio de clase</th>
        <th colspan="4" style="text-align:center;background:var(--accent-light);color:var(--accent-dark);">Fin de clase</th>
        <th rowspan="2">Detalle</th>
        <th rowspan="2"></th>
      </tr>
      <tr>
        <th>PA sis</th><th>PA dia</th><th>ppm</th><th>SpO2</th>
        <th>PA sis</th><th>PA dia</th><th>ppm</th><th>SpO2</th>
      </tr>
    </thead>
    <tbody>
      ${rows.length ? rows.map((r,i)=>{
        const abierto = r.estado!=='cerrado';
        const sinDatos = r.preSisNA && r.preDiaNA && r.prePpmNA && r.preSpo2NA && r.postSisNA && r.postDiaNA && r.postPpmNA && r.postSpo2NA;
        const estadoLabel = sinDatos ? 'Sin datos de salud' : (abierto ? 'Falta cierre' : 'Completo');
        const estadoStyle = sinDatos ? 'background:var(--line);color:var(--ink-fade);' : (abierto ? 'background:#fef3c7;color:#92400e;' : 'background:var(--teal-light);color:var(--teal-dark);');
        return `
      <tr>
        <td>${i+1}</td><td>${fmtFechaCorta(r.fecha)}</td><td style="white-space:nowrap;">${profesorNombre(r.profesorId)}</td>
        <td><span class="pill ${r.modalidad==='Virtual'?'pill-accent':'pill-teal'}" style="font-size:10.5px;">${r.modalidad||'Presencial'}</span></td>
        <td><span class="pill" style="font-size:10.5px;${estadoStyle}">${estadoLabel}</span></td>
        <td>${cellFor(r.preSisNA,r.preSis)}</td><td>${cellFor(r.preDiaNA,r.preDia)}</td><td>${cellFor(r.prePpmNA,r.prePpm)}</td><td>${r.preSpo2NA?naTag:(r.preSpo2!=null&&r.preSpo2!==''?r.preSpo2+'%':dash)}</td>
        <td>${cellFor(r.postSisNA,r.postSis)}</td><td>${cellFor(r.postDiaNA,r.postDia)}</td><td>${cellFor(r.postPpmNA,r.postPpm)}</td><td>${r.postSpo2NA?naTag:(r.postSpo2!=null&&r.postSpo2!==''?r.postSpo2+'%':dash)}</td>
        <td style="max-width:220px;">${r.detalle||''}${r.companeros&&r.companeros.length?`<div style="margin-top:4px;font-size:11px;color:var(--ink-fade);">👥 Sesión conjunta con: ${r.companeros.join(', ')} — cada uno tiene su propio registro individual, solo se muestra aquí para identificar la sesión compartida.</div>`:''}</td>
        <td style="white-space:nowrap;">
          ${!isAdmin && abierto ? `<button class="btn btn-outline btn-sm" data-completar="${r.id}" style="margin-right:4px;">Completar</button>` : ''}
          ${isAdmin ? `<button class="btn btn-outline btn-sm" data-editar-reg="${r.id}" style="margin-right:4px;">Editar</button><button class="btn btn-outline btn-sm" data-eliminar-reg="${r.id}" style="color:var(--danger);border-color:var(--danger);">Eliminar</button>` : ''}
        </td>
      </tr>`;}).join('') : `<tr><td colspan="15" style="text-align:center;color:var(--ink-fade);padding:30px;">Sin registros aún para este cliente.</td></tr>`}
    </tbody>
  `;
  if(!isAdmin){
    document.querySelectorAll('[data-completar]').forEach(btn=>{
      btn.addEventListener('click', ()=>openCompletarRegistroModal(btn.dataset.completar));
    });
  } else {
    document.querySelectorAll('[data-editar-reg]').forEach(btn=>{
      btn.addEventListener('click', ()=>openEditarRegistroModal(btn.dataset.editarReg));
    });
    document.querySelectorAll('[data-eliminar-reg]').forEach(btn=>{
      btn.addEventListener('click', ()=>openEliminarRegistroModal(btn.dataset.eliminarReg));
    });
  }
}

// Si el cliente asistió a la clase (se guardó un registro, tenga o no datos de salud), esa sesión
// debe contar en el HISTORIAL para que la cuenta de cobro la incluya — evita duplicar si ya existe.
function ensureHistorialCompletada(clienteId, fecha, profesorId, modalidad){
  const existe = HISTORIAL.find(h=>h.clienteId===clienteId && h.fecha===fecha && h.estado==='completada');
  if(!existe){
    HISTORIAL.push({ id:'h'+Date.now()+'_'+clienteId, clienteId, profesorId, fecha, tipo:`Entrenamiento adaptado ${modalidad==='Virtual'?'Online':'Presencial'}`, estado:'completada' });
  }
}

let registroCompaneros = []; // ids de clientes adicionales que tomaron la sesión conjunta (además del principal)
let registroCompanerosSearch = '';

// Genera un campo individual de salud con su propia casilla "No aplica" — permite que cada
// dato (PA sistólica, PA diastólica, PPM, SpO2, en pre o post) se marque "no aplica" de forma
// independiente, ya que en la práctica los datos a veces se toman de forma parcial.
function vitalFieldHTML(cid, field, label, placeholder){
  return `<div class="field">
    <label>${label}</label>
    <input type="number" id="r${field}_${cid}" placeholder="${placeholder}">
    <label style="display:flex;align-items:center;gap:4px;font-size:10px;color:var(--ink-fade);margin-top:3px;cursor:pointer;font-weight:400;">
      <input type="checkbox" class="field-na-check" data-na-cid="${cid}" data-na-field="${field}"> No aplica
    </label>
  </div>`;
}

function personaSaludBlockHTML(cid){
  const c = CLIENTES.find(x=>x.id===cid);
  return `
    <div class="card" data-persona-block="${cid}" style="padding:12px;margin-bottom:10px;border:1px solid var(--line);">
      <div style="font-weight:700;font-size:13.5px;margin-bottom:8px;">${c.nombre}</div>
      <div class="section-sub" style="margin-bottom:8px;">Marca "No aplica" solo en el dato puntual que no se tome — puedes registrar únicamente una parte de los datos.</div>
      <div class="pill pill-teal" style="margin-bottom:6px;font-size:10.5px;">Al iniciar la clase</div>
      <div class="field-row">
        ${vitalFieldHTML(cid,'PreSis','PA sistólica','120')}
        ${vitalFieldHTML(cid,'PreDia','PA diastólica','80')}
      </div>
      <div class="field-row">
        ${vitalFieldHTML(cid,'PrePpm','PPM','76')}
        ${vitalFieldHTML(cid,'PreSpo2','SpO2 (%)','97')}
      </div>
      <div class="pill pill-accent" style="margin:8px 0 6px;font-size:10.5px;">Al finalizar la clase</div>
      <div class="field-row">
        ${vitalFieldHTML(cid,'PostSis','PA sistólica','128')}
        ${vitalFieldHTML(cid,'PostDia','PA diastólica','84')}
      </div>
      <div class="field-row">
        ${vitalFieldHTML(cid,'PostPpm','PPM','102')}
        ${vitalFieldHTML(cid,'PostSpo2','SpO2 (%)','96')}
      </div>
    </div>`;
}

function openAddRegistroModal(){
  const cliente = CLIENTES.find(c=>c.id===selectedClienteRegistro);
  const now = isoDate(new Date());
  registroCompaneros = [];
  registroCompanerosSearch = '';
  openModal(`
    <div class="modal-head">
      <h3>Nuevo registro de sesión</h3>
      <button class="modal-close" onclick="closeModal()">${ICONS.x.replace('viewBox','width="15" height="15" viewBox')}</button>
    </div>
    <div class="modal-body">
      <div class="section-sub" style="margin-bottom:14px;">${cliente.nombre}</div>
      <div class="card" style="padding:10px 12px;margin-bottom:14px;background:var(--paper-dim);font-size:12.5px;color:var(--ink-fade);">Ningún campo es obligatorio — registra lo que tengas a la mano. Si solo tomas los datos al iniciar la clase, guarda así no más: el registro quedará marcado "Falta cierre" y podrás completarlo con los datos de fin de clase más tarde desde la tabla (botón "Completar"). Si algún dato puntual no se le toma a un cliente (ej. solo le tomas la tensión pero no la saturación), marca "No aplica" en ese dato específico — no hace falta marcar todo el bloque, y de todas formas queda registrada su asistencia a la clase.</div>
      <form id="regForm">
        <div class="field-row">
          <div class="field"><label>Fecha</label><input type="date" id="rFecha" value="${now}"></div>
          <div class="field"><label>Modalidad</label>
            <select id="rModalidad">
              <option value="Presencial">Presencial</option>
              <option value="Virtual">Virtual</option>
            </select>
          </div>
        </div>
        <div class="field" id="companerosField">
          <label>¿Sesión conjunta con otro cliente? (opcional)</label>
          <div class="section-sub" style="margin-bottom:6px;">Úsalo cuando dos clientes toman la misma clase a la misma hora (ej. Susan Suárez y Gladys Gutiérrez los viernes). Cada cliente del grupo tiene su propio bloque de datos abajo, con su propio registro individual — así queda claro cuál es el de cada uno.</div>
          <div id="companerosChips" style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px;"></div>
          <div style="position:relative;">
            <span style="position:absolute;left:12px;top:50%;transform:translateY(-50%);width:14px;height:14px;color:var(--ink-fade);display:inline-flex">${ICONS.search}</span>
            <input type="text" id="rCompaneroSearch" placeholder="Buscar cliente para agregar…" style="width:100%;padding:10px 12px 10px 34px;border:1.5px solid var(--line);border-radius:100px;">
          </div>
          <div id="companerosResultados" style="max-height:140px;overflow-y:auto;margin-top:6px;display:flex;flex-direction:column;gap:2px;"></div>
        </div>
        <div id="personasSaludContainer"></div>
        <div class="field"><label>Detalle / observación (de la sesión)</label><textarea id="rDetalle" placeholder="Tolerancia, molestias, ajustes de carga…"></textarea></div>
      </form>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" id="btnSaveRegistro">Guardar registro</button>
    </div>
  `);

  document.getElementById('personasSaludContainer').insertAdjacentHTML('beforeend', personaSaludBlockHTML(selectedClienteRegistro));
  bindPersonaNaToggle(selectedClienteRegistro);

  function bindPersonaNaToggle(cid){
    document.querySelectorAll(`[data-persona-block="${cid}"] .field-na-check`).forEach(chk=>{
      chk.addEventListener('change', ()=>{
        const field = chk.dataset.naField;
        const input = document.getElementById(`r${field}_${cid}`);
        input.disabled = chk.checked;
        if(chk.checked) input.value = '';
      });
    });
  }

  function renderCompaneroChips(){
    document.getElementById('companerosChips').innerHTML = registroCompaneros.map(id=>{
      const c = CLIENTES.find(x=>x.id===id);
      return `<span class="pill pill-accent" style="display:inline-flex;align-items:center;gap:6px;">${c.nombre}<span data-remove-comp="${id}" style="cursor:pointer;font-weight:800;">×</span></span>`;
    }).join('') || `<span class="section-sub">Sin acompañantes agregados — es una sesión individual.</span>`;
    document.querySelectorAll('[data-remove-comp]').forEach(x=>{
      x.addEventListener('click', ()=>{
        const cid = x.dataset.removeComp;
        registroCompaneros = registroCompaneros.filter(id=>id!==cid);
        document.querySelector(`[data-persona-block="${cid}"]`)?.remove();
        renderCompaneroChips(); renderCompaneroResultados();
      });
    });
  }
  function renderCompaneroResultados(){
    const q = registroCompanerosSearch.trim().toLowerCase();
    const el = document.getElementById('companerosResultados');
    if(!q){ el.innerHTML=''; return; }
    const results = CLIENTES.filter(c=>c.id!==selectedClienteRegistro && !registroCompaneros.includes(c.id) && c.nombre.toLowerCase().includes(q)).slice(0,8);
    el.innerHTML = results.map(c=>`<div class="card" data-add-comp="${c.id}" style="padding:8px 10px;cursor:pointer;font-size:13px;font-weight:600;" onmouseover="this.style.background='var(--paper-dim)'" onmouseout="this.style.background='#fff'">+ ${c.nombre}</div>`).join('') || `<div class="section-sub" style="padding:6px 2px;">Sin resultados.</div>`;
    document.querySelectorAll('[data-add-comp]').forEach(x=>{
      x.addEventListener('click', ()=>{
        const cid = x.dataset.addComp;
        registroCompaneros.push(cid);
        registroCompanerosSearch='';
        document.getElementById('rCompaneroSearch').value='';
        document.getElementById('personasSaludContainer').insertAdjacentHTML('beforeend', personaSaludBlockHTML(cid));
        bindPersonaNaToggle(cid);
        renderCompaneroChips(); renderCompaneroResultados();
      });
    });
  }
  renderCompaneroChips();
  document.getElementById('rCompaneroSearch').addEventListener('input', e=>{ registroCompanerosSearch = e.target.value; renderCompaneroResultados(); });

  document.getElementById('btnSaveRegistro').addEventListener('click', ()=>{
    const numOrBlank = id => { const el=document.getElementById(id); if(!el) return ''; const v = el.value; return v===''? '' : +v; };
    const fecha = document.getElementById('rFecha').value || isoDate(new Date());
    const modalidad = document.getElementById('rModalidad').value;
    const detalle = document.getElementById('rDetalle').value.trim();
    const grupoIds = [selectedClienteRegistro, ...registroCompaneros];
    const vitalFields = ['PreSis','PreDia','PrePpm','PreSpo2','PostSis','PostDia','PostPpm','PostSpo2'];
    grupoIds.forEach(cid=>{
      const otros = grupoIds.filter(id=>id!==cid).map(id=>CLIENTES.find(c=>c.id===id).nombre);
      const entry = {};
      vitalFields.forEach(f=>{
        const key = f.charAt(0).toLowerCase()+f.slice(1);
        const na = document.querySelector(`[data-persona-block="${cid}"] .field-na-check[data-na-field="${f}"]`)?.checked || false;
        entry[key+'NA'] = na;
        entry[key] = na ? '' : numOrBlank(`r${f}_${cid}`);
      });
      const postAnyResolved = ['postSis','postDia','postPpm','postSpo2'].some(k=> entry[k]!=='' || entry[k+'NA']);
      entry.estado = postAnyResolved ? 'cerrado' : 'abierto';
      const nuevoRegistro = { id:'r'+Date.now()+'_'+cid, clienteId:cid, fecha, modalidad, profesorId:STATE.user.id, detalle, companeros: otros, ...entry };
      REGISTROS.push(nuevoRegistro);
      ensureHistorialCompletada(cid, fecha, STATE.user.id, modalidad);
      const clienteDelRegistro = CLIENTES.find(c=>c.id===cid);
      if(clienteDelRegistro) appendRegistroToSheet(clienteDelRegistro, nuevoRegistro).catch(e=>console.warn('Drive sync falló (se guardó localmente):', e));
    });
    closeModal();
    renderTablaRegistro();
    toast(registroCompaneros.length ? `Registro guardado para ${grupoIds.length} clientes (sesión conjunta)` : 'Registro de sesión guardado', 'success');
  });
}

// Campo de salud con su propia casilla "No aplica" independiente, para los modales de
// "Completar" y "Editar registro". `id` debe ser el id completo del input (ej. "cPostSis" o "ePreSis").

  return `<div class="field">
    <label>${label}</label>
    <input type="number" id="${id}" placeholder="${placeholder}" value="${value}" ${naChecked?'disabled':''}>
    <label style="display:flex;align-items:center;gap:4px;font-size:10px;color:var(--ink-fade);margin-top:3px;cursor:pointer;font-weight:400;">
      <input type="checkbox" class="c-na-check" data-na-field="${id}" ${naChecked?'checked':''}> No aplica
    </label>
  </div>`;
}

let invoiceCounter = 0; // arranca en 0 (antes 4, número de ejemplo) — la primera cuenta de cobro real será 26-001

// Resume los datos de salud (inicio/fin de clase) del registro de ese cliente en esa fecha,
// para que la cuenta de cobro deje constancia completa de lo que se tomó en cada sesión.
function registroSaludTexto(clienteId, fecha){
  const r = REGISTROS.find(x=>x.clienteId===clienteId && x.fecha===fecha);
  if(!r) return '';
  const val = v => (v===undefined||v===null||v==='') ? '—' : v;
  const preTodoNA = r.preSisNA && r.preDiaNA && r.prePpmNA && r.preSpo2NA;
  const postTodoNA = r.postSisNA && r.postDiaNA && r.postPpmNA && r.postSpo2NA;
  if(preTodoNA && postTodoNA) return 'Datos de salud: no aplica para este cliente.';
  const campo = (v,na) => na ? 'no aplica' : val(v);
  const spo2 = (v,na) => na ? 'no aplica' : `${val(v)}${v!==''&&v!=null?'%':''}`;
  const pre = preTodoNA ? 'no aplica' : `PA ${campo(r.preSis,r.preSisNA)}/${campo(r.preDia,r.preDiaNA)} · ppm ${campo(r.prePpm,r.prePpmNA)} · SpO2 ${spo2(r.preSpo2,r.preSpo2NA)}`;
  const post = postTodoNA ? 'no aplica' : (r.estado==='cerrado' ? `PA ${campo(r.postSis,r.postSisNA)}/${campo(r.postDia,r.postDiaNA)} · ppm ${campo(r.postPpm,r.postPpmNA)} · SpO2 ${spo2(r.postSpo2,r.postSpo2NA)}` : 'sin cierre registrado');
  return `Inicio: ${pre} — Fin: ${post}`;
}

function computeInvoice(clienteId, monthStr){
  const cliente = CLIENTES.find(c=>c.id===clienteId);
  const entries = HISTORIAL.filter(h=>h.clienteId===clienteId && h.fecha.startsWith(monthStr)).sort((a,b)=>a.fecha.localeCompare(b.fecha));
  let anticipadaCount = 0, qtyCompletada=0, qtyAnticipadaCobrada=0, qtySobreTiempo=0;
  const detalle = [];
  entries.forEach(h=>{
    if(h.estado==='completada'){
      qtyCompletada++;
      detalle.push({fecha:h.fecha, profesor:profesorNombre(h.profesorId), texto:h.tipo, costo:cliente.tarifa, salud:registroSaludTexto(clienteId, h.fecha)});
    } else if(h.estado==='cancelada'){
      if(h.tipoCancelacion==='anticipada'){
        anticipadaCount++;
        if(anticipadaCount===1){
          detalle.push({fecha:h.fecha, profesor:profesorNombre(h.profesorId), texto:'Cancelación anticipada presencial (1ª del mes, sin costo)', costo:0});
        } else {
          qtyAnticipadaCobrada++;
          detalle.push({fecha:h.fecha, profesor:profesorNombre(h.profesorId), texto:'Cancelación anticipada presencial', costo:Math.round(cliente.tarifa*0.20)});
        }
      } else if(h.tipoCancelacion==='sobre_tiempo'){
        qtySobreTiempo++;
        detalle.push({fecha:h.fecha, profesor:profesorNombre(h.profesorId), texto:'Cancelación sobre tiempo presencial', costo:cliente.tarifa});
      } else {
        detalle.push({fecha:h.fecha, profesor:profesorNombre(h.profesorId), texto:'Cancelación programada (sin costo)', costo:0});
      }
    }
  });
  const items = [
    {n:1, cant:qtyCompletada, desc:'Entrenamiento adaptado Presencial', unit:cliente.tarifa, total:qtyCompletada*cliente.tarifa},
    {n:2, cant:qtyAnticipadaCobrada, desc:'Cancelación anticipada presencial', unit:Math.round(cliente.tarifa*0.20), total:qtyAnticipadaCobrada*Math.round(cliente.tarifa*0.20)},
    {n:3, cant:qtySobreTiempo, desc:'Cancelación sobre tiempo presencial', unit:cliente.tarifa, total:qtySobreTiempo*cliente.tarifa},
  ];
  const total = items.reduce((a,i)=>a+i.total,0);
  invoiceCounter++;
  const numero = `${String(new Date().getFullYear()).slice(2)}-${String(invoiceCounter).padStart(3,'0')}`;
  const lastDay = new Date(+monthStr.split('-')[0], +monthStr.split('-')[1], 0).getDate();
  const fechaEmision = `${lastDay}-${monthStr.split('-')[1]}-${monthStr.split('-')[0]}`.split('-').reverse().join('-');
  return {cliente, items, total, detalle, numero, fecha: isoDate(new Date(+monthStr.split('-')[0], +monthStr.split('-')[1]-1, lastDay))};
}

// Nombre del archivo pedido por el usuario: "Mes_NombreCliente.pdf" (ej. Julio_Lucy_Cardona.pdf).
function nombreArchivoCuenta(inv){
  const mesCap = NOMBRES_MES[+STATE.invoiceMonth.split('-')[1]-1];
  const mesCapitalizado = mesCap.charAt(0).toUpperCase()+mesCap.slice(1);
  return `${mesCapitalizado}_${inv.cliente.nombre.replace(/\s+/g,'_')}.pdf`;
}

async function buildInvoicePDFBlob(inv){
  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF('p','pt','a4');
  const pageW = pdf.internal.pageSize.getWidth();
  const els = [document.getElementById('invoicePage1'), document.getElementById('invoicePage2')];
  for(let i=0;i<els.length;i++){
    const canvas = await html2canvas(els[i], {scale:2, backgroundColor:'#ffffff'});
    const imgData = canvas.toDataURL('image/png');
    const imgH = (canvas.height * pageW) / canvas.width;
    if(i>0) pdf.addPage();
    pdf.addImage(imgData, 'PNG', 0, 0, pageW, imgH);
  }
  const filename = nombreArchivoCuenta(inv);
  return { blob: pdf.output('blob'), filename };
}

// Simula el guardado automático de la cuenta de cobro en la carpeta de Drive del cliente,
// dentro de la subcarpeta del año correspondiente. La app hoy no tiene conexión real con Drive
// (eso requiere autorización de Google en el sitio final publicado); mientras tanto queda
// registrado en las notificaciones con la ruta exacta que tendría, para validar el criterio
// (carpeta del cliente → año → "Mes_NombreCliente.pdf") antes de conectarlo de verdad.
function simulateGuardarEnDrive(inv, filename){
  const anio = STATE.invoiceMonth.split('-')[0];
  const ruta = `Drive / ${inv.cliente.nombre} / ${anio} / ${filename}`;
  NOTIFICACIONES.unshift({id:'n'+Date.now(), titulo:'Cuenta de cobro guardada en Drive', cuerpo:`Se guardó (simulado) en: ${ruta}`, hora:'Ahora', leido:false});
  renderNotifDrawer();
}

// Punto único que decide cómo avisar del guardado en Drive: si el administrador tiene Drive
// conectado, intenta subir el PDF de verdad a Drive/[Cliente]/[Año]/[Mes_Cliente].pdf y avisa según
// el resultado real; si no está conectado, cae al aviso simulado de antes (documentando la ruta que
// tendría) para no romper el flujo de quien todavía no ha conectado Drive.
async function guardarCuentaEnDriveConAviso(inv, filename, blob){
  if(driveConnected){
    const ok = await guardarPDFEnDriveReal(inv, filename, blob);
    if(ok){
      const anio = STATE.invoiceMonth.split('-')[0];
      NOTIFICACIONES.unshift({id:'n'+Date.now(), titulo:'Cuenta de cobro guardada en Drive', cuerpo:`Se guardó en: Drive / ${inv.cliente.nombre} / ${anio} / ${filename}`, hora:'Ahora', leido:false});
      renderNotifDrawer();
      return true;
    }
    toast('El PDF se descargó, pero no se pudo confirmar el guardado automático en Drive — revísalo manualmente.', 'error');
    return false;
  }
  simulateGuardarEnDrive(inv, filename);
  return false;
}

async function downloadInvoicePDF(inv){
  const btn = document.getElementById('btnDownloadInvoice');
  const original = btn.innerHTML;
  btn.innerHTML = 'Generando…'; btn.disabled = true;
  try{
    const { blob, filename } = await buildInvoicePDFBlob(inv);
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = filename; document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(url), 4000);
    const guardadoReal = await guardarCuentaEnDriveConAviso(inv, filename, blob);
    toast(guardadoReal ? 'PDF descargado y guardado en la carpeta del cliente en Drive' : 'PDF descargado', 'success');
  }catch(err){
    console.error(err);
    toast('No se pudo generar el PDF', 'error');
  }
  btn.innerHTML = original; btn.disabled = false;
}

// Compartir la cuenta de cobro por WhatsApp o correo. Ningún sitio web puede adjuntar un archivo
// automáticamente a WhatsApp Web o a un cliente de correo (restricción de seguridad de los navegadores),
// así que usamos dos caminos: (1) en celular, el menú nativo "Compartir" del sistema (Web Share API con
// archivos) permite elegir WhatsApp/Gmail y el PDF queda adjunto automáticamente; (2) si el navegador no
// soporta compartir archivos (típicamente en computador), se descarga el PDF y se abre WhatsApp Web /
// el correo con el mensaje ya redactado, listo para adjuntar el archivo manualmente.
async function shareInvoicePDF(inv, via){
  const btnId = via==='whatsapp' ? 'btnCompartirWhatsapp' : 'btnCompartirCorreo';
  const btn = document.getElementById(btnId);
  const original = btn.innerHTML;
  btn.innerHTML = 'Generando…'; btn.disabled = true;
  try{
    const { blob, filename } = await buildInvoicePDFBlob(inv);
    const mensaje = `Hola ${inv.cliente.nombre.split(' ')[0]}, te comparto tu cuenta de cobro de ${nombreMes(STATE.invoiceMonth)} por un total de ${money(inv.total)}. Cualquier duda me cuentas.`;

    await guardarCuentaEnDriveConAviso(inv, filename, blob);
    const file = new File([blob], filename, {type:'application/pdf'});
    const canShareFile = navigator.canShare && navigator.canShare({files:[file]});
    if(canShareFile){
      await navigator.share({ files:[file], title:'Cuenta de cobro', text: mensaje });
      toast('Compartido', 'success');
    } else {
      // Respaldo para computador / navegadores sin soporte de compartir archivos:
      // se descarga el PDF y se abre WhatsApp Web o el correo con el texto ya listo.
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = filename; document.body.appendChild(a); a.click(); a.remove();
      setTimeout(()=>URL.revokeObjectURL(url), 4000);
      if(via==='whatsapp'){
        const tel = (inv.cliente.telefono||'').replace(/\D/g,'');
        const waUrl = `https://wa.me/${tel.startsWith('57')||!tel?tel:'57'+tel}?text=${encodeURIComponent(mensaje)}`;
        window.open(waUrl, '_blank');
        toast('PDF descargado. Se abrió WhatsApp con el mensaje — adjunta el archivo descargado.', 'success');
      } else {
        const subject = `Cuenta de cobro ${nombreMes(STATE.invoiceMonth)} — Andersson Personal Trainer`;
        window.location.href = `mailto:?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(mensaje)}`;
        toast('PDF descargado. Se abrió tu correo con el mensaje — adjunta el archivo descargado.', 'success');
      }
    }
  }catch(err){
    if(err && err.name==='AbortError'){ /* el usuario cerró el menú de compartir, no es un error */ }
    else { console.error(err); toast('No se pudo compartir el PDF', 'error'); }
  }
  btn.innerHTML = original; btn.disabled = false;
}

let clientesSearch = '';

// ---- Historial mensual / promedios anuales por cliente (para la ficha de cliente y el dashboard) ----
function anioActual(){ return String(new Date().getFullYear()); }
function mesesTranscurridosAnio(){ return new Date().getMonth()+1; } // enero=1 ... incluye el mes actual
const NOMBRES_MES = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
function nombreMes(mesStr){ const [y,m] = mesStr.split('-').map(Number); return `${NOMBRES_MES[m-1]} ${y}`; }

function historialMensualCliente(clienteId){
  const anio = anioActual();
  const porMes = {};
  HISTORIAL.filter(h=>h.clienteId===clienteId && h.fecha.startsWith(anio)).forEach(h=>{
    const mes = h.fecha.slice(0,7);
    if(!porMes[mes]) porMes[mes] = {completadas:0, canceladas:0};
    if(h.estado==='completada') porMes[mes].completadas++;
    else if(h.estado==='cancelada') porMes[mes].canceladas++;
  });
  return porMes; // {'2026-07': {completadas, canceladas}, ...}
}

function promedioAnualCliente(clienteId){
  const anio = anioActual();
  const meses = mesesTranscurridosAnio();
  const entradas = HISTORIAL.filter(h=>h.clienteId===clienteId && h.fecha.startsWith(anio));
  const completadas = entradas.filter(h=>h.estado==='completada').length;
  const canceladas = entradas.filter(h=>h.estado==='cancelada').length;
  return {
    completadas, canceladas, meses,
    promSesiones: meses ? completadas/meses : 0,
    promCancelaciones: meses ? canceladas/meses : 0,
  };
}

// Ranking de clientes (año actual) por total de sesiones completadas o canceladas — para el dashboard del admin.
function rankingClientes(estado, limite=5){
  const anio = anioActual();
  const counts = {};
  HISTORIAL.filter(h=>h.estado===estado && h.fecha.startsWith(anio)).forEach(h=>{
    counts[h.clienteId] = (counts[h.clienteId]||0)+1;
  });
  return Object.entries(counts)
    .map(([id,count])=>({cliente:CLIENTES.find(c=>c.id===id), count}))
    .filter(x=>x.cliente)
    .sort((a,b)=>b.count-a.count)
    .slice(0,limite);
}

// Valor real de las clases dictadas por un profesor en un mes, y valor de la pérdida por cancelaciones,
// usando exactamente las mismas reglas de negocio y el mismo `cliente.tarifa` verificado contra Drive
// que ya se usan en computeInvoice() para la cuenta de cobro — nunca se inventa ni se aproxima un valor.
// Se agrupa por cliente para aplicar correctamente la regla de "1ª cancelación anticipada del mes sin costo".
function resumenValorProfesorMes(profesorId, monthStr){
  const entriesByClient = {};
  HISTORIAL.filter(h=>h.profesorId===profesorId && h.fecha.startsWith(monthStr)).forEach(h=>{
    (entriesByClient[h.clienteId] = entriesByClient[h.clienteId]||[]).push(h);
  });
  let valorClases = 0, valorPerdida = 0;
  Object.entries(entriesByClient).forEach(([clienteId, entries])=>{
    const cliente = CLIENTES.find(c=>c.id===clienteId);
    if(!cliente || cliente.tarifa==null) return; // sin tarifa verificada en Drive: no se inventa, se excluye del cálculo
    let anticipadaCount = 0;
    entries.slice().sort((a,b)=>a.fecha.localeCompare(b.fecha)).forEach(h=>{
      if(h.estado==='completada'){
        valorClases += cliente.tarifa;
      } else if(h.estado==='cancelada'){
        if(h.tipoCancelacion==='anticipada'){
          anticipadaCount++;
          // 1ª anticipada del mes: sin costo para el cliente → se pierde el 100% de la tarifa.
          // Siguientes: el cliente paga 20% → se pierde el 80% restante de la tarifa.
          valorPerdida += anticipadaCount===1 ? cliente.tarifa : Math.round(cliente.tarifa*0.80);
        } else if(h.tipoCancelacion==='sobre_tiempo'){
          // El cliente paga el 100% de la tarifa: no hay pérdida.
        } else {
          // Cancelación programada: sin costo para el cliente → se pierde el 100% de la tarifa.
          valorPerdida += cliente.tarifa;
        }
      }
    });
  });
  return { valorClases, valorPerdida };
}

        <div class="section-sub">Sesiones este mes</div><div style="font-size:24px;font-weight:800;margin-top:4px;color:var(--teal-dark);">${histScope.filter(h=>h.fecha.startsWith(STATE.invoiceMonth)&&h.estado==='completada').length}</div>

        <div class="section-sub">Cancelaciones este mes</div><div style="font-size:24px;font-weight:800;margin-top:4px;color:var(--danger);">${histScope.filter(h=>h.fecha.startsWith(STATE.invoiceMonth)&&h.estado==='cancelada').length}</div>
      </div>
    </div>
    <div class="card fade-up" style="padding:18px 20px;margin-bottom:20px;">
      <div style="font-weight:800;font-size:14px;margin-bottom:12px;">Resumen por profesor</div>

            <th style="padding:6px 10px 6px 0;">Profesor</th>
            <th style="padding:6px 10px;">Clases / semana</th>
            <th style="padding:6px 10px;">Cancelaciones (mes)</th>
            <th style="padding:6px 10px;">Prom. horas / semana</th>
            <th style="padding:6px 10px;">Valor clases (mes)</th>
            <th style="padding:6px 10px;">Pérdida por cancelaciones (mes)</th>
          </tr></thead>
          <tbody>
            ${PROFESORES.map(p=>{
              const clasesSemana = SCHEDULE.filter(s=>s.profesorId===p.id).length;
              const cancelacionesMes = HISTORIAL.filter(h=>h.profesorId===p.id && h.fecha.startsWith(STATE.invoiceMonth) && h.estado==='cancelada').length;
              const horasSemana = clasesSemana; // 1h estimada por clase (duración no registrada aún)
              const { valorClases, valorPerdida } = resumenValorProfesorMes(p.id, STATE.invoiceMonth);
              return `<tr style="border-top:1px solid var(--line);">

        ${topCancela.length ? topCancela.map((r,i)=>`

      <div class="card" style="padding:18px 20px;flex:1;min-width:260px;">
        <div style="font-weight:800;font-size:14px;margin-bottom:2px;">Clientes con más sesiones</div>
        <div class="section-sub" style="margin-bottom:12px;">Total de sesiones completadas en ${anioActual()}</div>
        ${topSesiones.length ? topSesiones.map((r,i)=>`
          <div style="display:flex;align-items:center;gap:10px;padding:7px 0;${i? 'border-top:1px solid var(--line);':''}">

      <div style="position:relative;max-width:320px;flex:1;min-width:220px;">
        <span style="position:absolute;left:14px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--ink-fade);display:inline-flex">${ICONS.search}</span>
        <input type="text" id="clienteSearch" placeholder="Buscar cliente…" value="${clientesSearch}" style="width:100%;padding:11px 14px 11px 38px;border:1.5px solid var(--line);border-radius:100px;background:#fff;">

      <div class="card fade-up" data-client="${c.id}" style="padding:18px;cursor:pointer;transition:box-shadow .15s;" onmouseover="this.style.boxShadow='var(--shadow-md)'" onmouseout="this.style.boxShadow='var(--shadow-sm)'">

            <div style="font-weight:700;font-size:14.5px;">${c.nombre}</div>

          ${c.activo===false?`<span class="pill" style="background:var(--paper-dim);color:var(--ink-fade);">Antiguo</span>`:overview?`<span class="pill pill-teal" style="background:var(--success-light);color:var(--success);">Activo</span>`:''}
          ${overview?`<span class="pill pill-teal">${sesionesMes(c)} sesiones</span>`:''}
          ${overview&&cancelMes(c)?`<span class="pill pill-danger">${cancelMes(c)} canceladas</span>`:''}
        </div>
      </div>`).join('') || `<div class="card" style="padding:36px;text-align:center;color:var(--ink-fade);grid-column:1/-1;">No se encontraron clientes.</div>`}
    </div>
  `;
  document.getElementById('clienteSearch').addEventListener('input', e=>{ clientesSearch = e.target.value; reRenderPreserveFocus(renderClientes, 'clienteSearch'); });
  document.getElementById('btnSyncClientes').addEventListener('click', ()=>{
    toast('Actualizando información de clientes desde Drive…');
    setTimeout(()=>{ driveLastSync = 'Ahora'; renderClientes(); toast('Clientes actualizados desde Drive', 'success'); }, 800);
  });
  document.querySelectorAll('[data-client]').forEach(card=>{
    card.addEventListener('click', ()=>openClienteModal(card.dataset.client));
  });

function openClienteModal(id){
  const c = CLIENTES.find(x=>x.id===id);
  const porMes = historialMensualCliente(c.id);
  const mesesOrdenados = Object.keys(porMes).sort();
  const prom = promedioAnualCliente(c.id);
  openModal(`
    <div class="modal-head">
      <h3>Ficha del cliente</h3>
      <button class="modal-close" onclick="closeModal()">${ICONS.x.replace('viewBox','width="15" height="15" viewBox')}</button>
    </div>
    <div class="modal-body">
      <div style="display:flex;gap:14px;align-items:center;margin-bottom:18px;">
        <div class="avatar" style="width:52px;height:52px;font-size:18px;background:var(--teal);">${initials(c.nombre)}</div>
        <div><div style="font-weight:800;font-size:17px;display:flex;align-items:center;gap:8px;">${c.nombre} ${c.activo===false?`<span class="pill" style="background:var(--paper-dim);color:var(--ink-fade);font-size:10.5px;">Antiguo</span>`:''}</div><div class="section-sub">${fmtCC(c)} · ${fmtEdad(c)}</div></div>
      </div>
      <div style="display:flex;flex-direction:column;gap:12px;">
        <div class="card" style="padding:12px 14px;display:flex;gap:10px;align-items:flex-start;background:var(--paper-dim);border:none;">
          <span style="width:16px;height:16px;margin-top:2px;color:var(--ink-fade);display:inline-flex">${ICONS.pin}</span>
          <div><div style="font-size:11.5px;color:var(--ink-fade);">Dirección</div><div style="font-size:13.5px;font-weight:600;">${c.direccion}</div></div>
        </div>
        <div class="card" style="padding:12px 14px;display:flex;gap:10px;align-items:flex-start;background:var(--paper-dim);border:none;">
          <span style="width:16px;height:16px;margin-top:2px;color:var(--ink-fade);display:inline-flex">${ICONS.phone}</span>
          <div><div style="font-size:11.5px;color:var(--ink-fade);">Teléfono</div><div style="font-size:13.5px;font-weight:600;">${c.telefono}</div></div>
        </div>
        <div class="card" style="padding:12px 14px;display:flex;gap:10px;align-items:flex-start;background:var(--paper-dim);border:none;">
          <span style="width:16px;height:16px;margin-top:2px;color:var(--danger);display:inline-flex">${ICONS.heart}</span>
          <div style="flex:1;">
            <div style="font-size:11.5px;color:var(--ink-fade);">Diagnóstico completo (Anamnesis)</div>
            <div style="font-size:13.5px;font-weight:600;line-height:1.5;white-space:pre-wrap;">${c.diagnostico}</div>
            <button class="btn btn-outline btn-sm" id="btnDescargarAnamnesis" style="margin-top:10px;">
              <span style="width:13px;height:13px;display:inline-flex">${ICONS.download}</span>Descargar PDF (Anamnesis completa)
            </button>
          </div>
        </div>
        ${isAdminOverview() ? `
        <div class="card" style="padding:14px;background:var(--paper-dim);border:none;">
          <div style="font-weight:700;font-size:13.5px;margin-bottom:2px;">Historial de sesiones por mes (${anioActual()})</div>
          <div class="section-sub" style="margin-bottom:10px;">Sesiones completadas y cancelaciones, mes a mes</div>
          ${mesesOrdenados.length ? `
          <div style="overflow-x:auto;">
            <table style="width:100%;border-collapse:collapse;font-size:12.5px;">
              <thead><tr style="text-align:left;color:var(--ink-fade);font-size:10.5px;text-transform:uppercase;letter-spacing:.03em;">
                <th style="padding:4px 8px 4px 0;">Mes</th>
                <th style="padding:4px 8px;">Completadas</th>
                <th style="padding:4px 8px;">Canceladas</th>
              </tr></thead>
              <tbody>
                ${mesesOrdenados.map(mes=>`
                <tr style="border-top:1px solid var(--line);">
                  <td style="padding:7px 8px 7px 0;font-weight:600;text-transform:capitalize;">${nombreMes(mes)}</td>
                  <td style="padding:7px 8px;color:var(--teal-dark);font-weight:700;">${porMes[mes].completadas}</td>
                  <td style="padding:7px 8px;${porMes[mes].canceladas?'color:var(--danger);font-weight:700;':''}">${porMes[mes].canceladas}</td>

          <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:12px;">
            <div class="pill pill-teal" style="font-size:11px;">Promedio ${prom.promSesiones.toFixed(1)} sesiones completadas / mes</div>
            <div class="pill pill-danger" style="font-size:11px;">Promedio ${prom.promCancelaciones.toFixed(1)} cancelaciones / mes</div>
          </div>
          <div class="section-sub" style="margin-top:6px;">Calculado sobre los ${prom.meses} mes${prom.meses===1?'':'es'} transcurridos de ${anioActual()} (${prom.completadas} completadas y ${prom.canceladas} canceladas en total este año).</div>
        </div>` : ''}
      </div>
    </div>
    <div class="modal-foot" style="flex-wrap:wrap;">
      ${isAdminOverview() && c.activo!==false ? `<button class="btn btn-outline" style="color:var(--danger);border-color:var(--danger);" onclick="openCerrarClienteModal('${c.id}')">Cerrar cliente definitivamente</button>` : ''}
      <button class="btn btn-outline" onclick="closeModal()">Cerrar</button>
      <button class="btn btn-primary" onclick="closeModal(); selectedClienteRegistro='${c.id}'; switchModule('registro');">Ver sesiones</button>
    </div>

function openCerrarClienteModal(clienteId){
  const c = CLIENTES.find(x=>x.id===clienteId);
  if(!c) return;
  const clasesFuturas = SCHEDULE.filter(s=>s.clienteId===clienteId).length;
  openModal(`
    <div class="modal-head">
      <h3>Cerrar cliente definitivamente</h3>
      <button class="modal-close" onclick="closeModal()">${ICONS.x.replace('viewBox','width="15" height="15" viewBox')}</button>
    </div>
    <div class="modal-body">
      <div class="card" style="padding:14px;margin-bottom:16px;background:var(--paper-dim);border:none;">
        <div style="font-weight:700;">${c.nombre}</div>
        <div class="section-sub">${fmtCC(c)}</div>
      </div>
      <div class="card" style="padding:12px 14px;background:#FEF2F2;border:1.5px solid #FCA5A5;margin-bottom:16px;">
        <div style="font-size:13px;font-weight:700;color:var(--danger);margin-bottom:4px;">Esta acción no se puede deshacer desde la app</div>
        <div style="font-size:12.5px;color:var(--ink-soft);">El cliente quedará marcado como "Antiguo" y se eliminarán sus ${clasesFuturas} clase${clasesFuturas===1?'':'s'} del horario recurrente (semana actual y proyección de disponibilidad). Su historial de sesiones y cuentas de cobro anteriores NO se borra. Si más adelante vuelve a tomar clases, avísame para reactivarlo.</div>
      </div>
      <form id="cerrarClienteForm">
        <div class="field">
          <label>Motivo (opcional)</label>
          <textarea id="cerrarMotivo" placeholder="Ej: cliente decidió terminar el proceso, se mudó de ciudad, etc."></textarea>
        </div>
      </form>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-danger" id="btnConfirmCerrarCliente">Confirmar cierre definitivo</button>
    </div>
  `);
  document.getElementById('btnConfirmCerrarCliente').addEventListener('click', ()=>{
    const motivo = document.getElementById('cerrarMotivo').value.trim();
    cerrarClienteDefinitivo(clienteId, motivo);
  });
}

function cerrarClienteDefinitivo(clienteId, motivo){
  const c = CLIENTES.find(x=>x.id===clienteId);
  if(!c) return;
  c.activo = false;
  const eliminadas = SCHEDULE.filter(s=>s.clienteId===clienteId).length;
  for(let i=SCHEDULE.length-1;i>=0;i--){ if(SCHEDULE[i].clienteId===clienteId) SCHEDULE.splice(i,1); }
  NOTIFICACIONES.unshift({id:'n'+Date.now(), titulo:'Cliente cerrado definitivamente', cuerpo:`${c.nombre} fue marcado como cliente antiguo por ${STATE.user.nombre}${motivo?': "'+motivo+'"':''}. Se retiraron ${eliminadas} clase${eliminadas===1?'':'s'} del horario recurrente.`, hora:'Ahora', leido:false});
  renderNotifDrawer();
  closeModal();
  if(STATE.module==='horario') renderHorario();
  if(STATE.module==='clientes') renderClientes();
  toast(`${c.nombre} quedó cerrado definitivamente. Su horario recurrente fue actualizado.`, 'success');
}

function downloadAnamnesisPDF(clienteId){
  const c = CLIENTES.find(x=>x.id===clienteId);
  const btn = document.getElementById('btnDescargarAnamnesis');
  const original = btn ? btn.innerHTML : null;
  if(btn){ btn.innerHTML = 'Generando…'; btn.disabled = true; }
  try{
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF('p','pt','a4');
    const pageW = pdf.internal.pageSize.getWidth();
    const pageH = pdf.internal.pageSize.getHeight();
    const margin = 50;
    const usableW = pageW - margin*2;
    let y = 55;

    const logoW = 90, logoH = logoW * (373/501);
    pdf.addImage(LOGO_BLACK, 'PNG', pageW - margin - logoW, 40, logoW, logoH);
    pdf.setFont('helvetica','bold'); pdf.setFontSize(15); pdf.setTextColor(20,20,20);
    pdf.text('Ficha de cliente', margin, y); y += 20;
    pdf.setFontSize(12); pdf.setTextColor(90,90,90);
    pdf.text('Anamnesis completa', margin, y); y += 18;
    y = Math.max(y, 40 + logoH + 14);
    pdf.setDrawColor(210); pdf.line(margin, y, pageW-margin, y); y += 24;

    const field = (label, value) => {
      pdf.setFont('helvetica','bold'); pdf.setFontSize(10.5); pdf.setTextColor(30,30,30);
      pdf.text(label, margin, y);
      pdf.setFont('helvetica','normal'); pdf.setTextColor(50,50,50);
      const lines = pdf.splitTextToSize(String(value||''), usableW-95);
      pdf.text(lines, margin+95, y);
      y += Math.max(lines.length,1)*14 + 6;
    };
    field('Nombre:', c.nombre);
    field('Cédula:', fmtCC(c));
    field('Edad:', fmtEdad(c));
    field('Dirección:', c.direccion);
    field('Teléfono:', c.telefono);

    y += 8;
    pdf.setDrawColor(210); pdf.line(margin, y, pageW-margin, y); y += 22;
    pdf.setFont('helvetica','bold'); pdf.setFontSize(11.5); pdf.setTextColor(20,20,20);
    pdf.text('Anamnesis completa (tal como está en la pestaña "Anamnesis" del Excel de Drive)', margin, y, {maxWidth: usableW}); y += 30;
    pdf.setFont('helvetica','normal'); pdf.setFontSize(10.5); pdf.setTextColor(40,40,40);
    const lineHeight = 14.5;
    const writeParagraphs = (text) => {
      const paragraphs = String(text||'').split(/\n\s*\n/);
      paragraphs.forEach((para, pi)=>{
        const lines = pdf.splitTextToSize(para.trim(), usableW);
        lines.forEach(line=>{
          if(y > pageH-55){ pdf.addPage(); y = 55; }
          pdf.text(line, margin, y); y += lineHeight;
        });
        if(pi < paragraphs.length-1) y += 8;
      });
    };
    if(c.anamnesisCompleta){
      writeParagraphs(c.anamnesisCompleta);
    } else {
      pdf.setFont('helvetica','italic'); pdf.setTextColor(120,120,120);
      const nota = pdf.splitTextToSize('No hay Anamnesis completa disponible para descargar de este cliente. ' + (c.diagnostico||''), usableW);
      nota.forEach(line=>{
        if(y > pageH-55){ pdf.addPage(); y = 55; }
        pdf.text(line, margin, y); y += lineHeight;
      });
      pdf.setFont('helvetica','normal'); pdf.setTextColor(40,40,40);
    }

    y += 18;
    if(y > pageH-40){ pdf.addPage(); y = 55; }
    pdf.setFontSize(8); pdf.setTextColor(150);
    pdf.text(`Generado el ${fmtFechaCorta(isoDate(new Date()))} desde la app de Andersson Personal Trainer.`, margin, y);

    pdf.save(`Anamnesis_${c.nombre.replace(/\s+/g,'_')}.pdf`);
    toast('PDF descargado', 'success');
  }catch(err){
    console.error(err);
    toast('No se pudo generar el PDF', 'error');
  }
  if(btn){ btn.innerHTML = original; btn.disabled = false; }
}

/* ===================== INIT ===================== */
loadState();
(function initApp(){
  const session = loadSession();
  const user = session && USERS.find(u=>u.id===session.userId);
  if(user){
    // Sesión válida guardada en este navegador — entra directo a la app sin pedir credenciales
    // de nuevo, y vuelve al módulo donde estaba en vez de arrancar siempre en Horario.
    STATE.user = user;
    if(session.adminViewMode) STATE.adminViewMode = session.adminViewMode;
    if(session.viewProfesorId !== undefined) STATE.viewProfesorId = session.viewProfesorId;
    if(session.selectedClienteRegistro) selectedClienteRegistro = session.selectedClienteRegistro;
    const validModule = NAV_ITEMS.some(n=>n.id===session.module && n.roles.includes(user.rol));
    bootApp(validModule ? session.module : 'horario');
  } else {
    renderLogin();
  }
})();
</script>
