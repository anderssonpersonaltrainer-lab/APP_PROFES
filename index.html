/* ===================== VARIABLES & RESET ===================== */
:root{
  --ink:#10151f;
  --ink-soft:#2a3342;
  --ink-fade:#5c6779;
  --paper:#f4f6f9;
  --paper-dim:#e7ebf1;
  --card:#ffffff;
  --line:#dde3ec;
  --accent:#2563eb;
  --accent-dark:#1d4ed8;
  --accent-light:#dbe7fd;
  --teal:#475569;
  --teal-dark:#1e293b;
  --teal-light:#e7ecf3;
  --danger:#e5484d;
  --danger-light:#fde5e6;
  --warning:#c98a1f;
  --warning-light:#f6ecd8;
  --success:#2f8a5b;
  --success-light:#e2f3ea;
  --radius-sm:10px;
  --radius-md:16px;
  --radius-lg:24px;
  --shadow-sm:0 2px 8px rgba(20,20,26,.06);
  --shadow-md:0 8px 24px rgba(20,20,26,.10);
  --shadow-lg:0 20px 48px rgba(20,20,26,.18);
  --ff-body:'Poppins',system-ui,sans-serif;
  --ff-script:'Yellowtail',cursive;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{
  font-family:var(--ff-body);
  background:var(--paper);
  color:var(--ink);
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
}
button{font-family:inherit;cursor:pointer;border:none;background:none;}
input,select,textarea{font-family:inherit;font-size:15px;}
a{color:inherit;}
::-webkit-scrollbar{width:8px;height:8px;}
::-webkit-scrollbar-thumb{background:#d8d2c4;border-radius:10px;}
.hidden{display:none !important;}
.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);}

/* ===================== SHARED UI ===================== */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  padding:12px 20px;border-radius:100px;font-weight:600;font-size:14.5px;
  transition:transform .15s ease, box-shadow .15s ease, background .15s ease;
  white-space:nowrap;
}
.btn:active{transform:scale(.96);}
.btn-primary{background:var(--accent);color:#fff;box-shadow:0 6px 16px rgba(37,99,235,.35);}
.btn-primary:hover{background:var(--accent-dark);}
.btn-dark{background:var(--ink);color:#fff;}
.btn-teal{background:var(--teal);color:#fff;box-shadow:0 6px 16px rgba(71,85,105,.28);}
.btn-outline{background:transparent;border:1.5px solid var(--line);color:var(--ink);}
.btn-outline:hover{border-color:var(--ink);}
.btn-ghost{background:var(--paper-dim);color:var(--ink-soft);}
.btn-danger{background:var(--danger);color:#fff;}
.btn-sm{padding:8px 14px;font-size:13px;}
.btn-block{width:100%;}
.btn[disabled]{opacity:.5;pointer-events:none;}

.card{background:var(--card);border-radius:var(--radius-md);box-shadow:var(--shadow-sm);border:1px solid var(--line);}
.pill{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:100px;font-size:12px;font-weight:700;letter-spacing:.02em;}
.pill-teal{background:var(--teal-light);color:var(--teal-dark);}
.pill-accent{background:var(--accent-light);color:var(--accent-dark);}
.pill-danger{background:var(--danger-light);color:var(--danger);}
.pill-warning{background:var(--warning-light);color:#a86b0c;}
.pill-success{background:var(--success-light);color:var(--success);}
.pill-gray{background:var(--paper-dim);color:var(--ink-fade);}

.field{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;}
.field label{font-size:13px;font-weight:600;color:var(--ink-soft);}
.field .req{color:var(--danger);}
.field input,.field select,.field textarea{
  padding:12px 14px;border:1.5px solid var(--line);border-radius:var(--radius-sm);
  background:#fff;transition:border-color .15s;color:var(--ink);
}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--accent);}
.field textarea{resize:vertical;min-height:70px;}
.field small{color:var(--ink-fade);font-size:12px;}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}

.section-title{font-size:20px;font-weight:800;letter-spacing:-.01em;}
.section-sub{color:var(--ink-fade);font-size:13.5px;margin-top:2px;}

/* toast */
#toastHost{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:9999;display:flex;flex-direction:column;gap:8px;align-items:center;}
.toast{
  background:var(--ink);color:#fff;padding:12px 20px;border-radius:100px;font-size:13.5px;font-weight:600;
  box-shadow:var(--shadow-lg);display:flex;align-items:center;gap:8px;
  animation:toastIn .25s ease;
}
.toast.success{background:var(--success);}
.toast.error{background:var(--danger);}
@keyframes toastIn{from{opacity:0;transform:translateY(-12px) translateX(0);}to{opacity:1;transform:translateY(0);}}

/* animations */
@keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
@keyframes popIn{from{opacity:0;transform:scale(.92);}to{opacity:1;transform:scale(1);}}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.45;}}
@keyframes spin{to{transform:rotate(360deg);}}
.fade-up{animation:fadeUp .45s cubic-bezier(.22,1,.36,1) both;}
.pop-in{animation:popIn .28s cubic-bezier(.22,1,.36,1) both;}

/* ===================== LOGO ===================== */
.brand-mark{display:flex;align-items:center;gap:10px;}
.brand-mark svg{display:block;}
.brand-word{font-family:var(--ff-script);font-size:28px;line-height:1;color:var(--ink);}
.brand-sub{font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-fade);font-weight:600;margin-top:-2px;}

/* ===================== LOGIN ===================== */
#loginScreen{
  min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;
  background:
    radial-gradient(circle at 15% 15%, rgba(37,99,235,.18), transparent 45%),
    radial-gradient(circle at 85% 85%, rgba(71,85,105,.16), transparent 45%),
    var(--ink);
  position:relative;overflow:hidden;
}
#loginScreen::before{
  content:'';position:absolute;inset:0;
  background-image:radial-gradient(rgba(255,255,255,.06) 1px, transparent 1px);
  background-size:26px 26px;pointer-events:none;
}
.login-card{
  width:100%;max-width:400px;background:var(--paper);border-radius:28px;padding:36px 30px 30px;
  box-shadow:var(--shadow-lg);position:relative;z-index:1;
  animation:fadeUp .5s cubic-bezier(.22,1,.36,1) both;
}
.login-logo-wrap{display:flex;flex-direction:column;align-items:center;text-align:center;margin-bottom:22px;}
.login-logo-wrap .brand-word{font-size:38px;}
.login-tag{margin-top:6px;color:var(--ink-fade);font-size:13px;}
.role-toggle{display:flex;background:var(--paper-dim);border-radius:100px;padding:4px;margin-bottom:18px;}
.role-toggle button{flex:1;padding:9px;border-radius:100px;font-size:12.5px;font-weight:700;color:var(--ink-fade);transition:all .2s;}
.role-toggle button.active{background:var(--ink);color:#fff;}
.login-hint{background:var(--teal-light);border-radius:var(--radius-sm);padding:10px 12px;font-size:12px;color:var(--teal-dark);margin-top:6px;line-height:1.5;}
.login-error{background:var(--danger-light);color:var(--danger);border-radius:var(--radius-sm);padding:10px 12px;font-size:12.5px;font-weight:600;margin-bottom:12px;display:none;align-items:center;gap:8px;}
.login-error.show{display:flex;animation:popIn .25s ease;}

/* ===================== APP SHELL ===================== */
#app{display:none;min-height:100vh;}
#app.active{display:flex;}
.sidebar{
  width:230px;flex-shrink:0;background:var(--ink);color:#fff;display:flex;flex-direction:column;
  padding:22px 16px;position:sticky;top:0;height:100vh;
}
.sidebar .brand-mark{padding:4px 8px 30px;justify-content:center;}
.sidebar .brand-word{color:#fff;}
.sidebar .brand-sub{color:rgba(255,255,255,.5);}
.nav-item{
  display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:14px;color:rgba(255,255,255,.7);
  font-weight:600;font-size:14px;margin-bottom:4px;transition:all .18s;position:relative;
}
.nav-item svg{flex-shrink:0;width:19px;height:19px;}
.nav-item:hover{background:rgba(255,255,255,.06);color:#fff;}
.nav-item.active{background:var(--accent);color:#fff;box-shadow:0 6px 16px rgba(37,99,235,.35);}
.nav-spacer{flex:1;}
.sidebar-user{
  display:flex;align-items:center;gap:10px;padding:12px;border-radius:14px;background:rgba(255,255,255,.06);
  margin-bottom:8px;
}
.avatar{
  width:36px;height:36px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;
  justify-content:center;font-weight:700;font-size:14px;flex-shrink:0;
}
.sidebar-user .who{overflow:hidden;}
.sidebar-user .who b{display:block;font-size:13px;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sidebar-user .who span{font-size:11px;color:rgba(255,255,255,.5);}
.logout-btn{display:flex;align-items:center;gap:10px;padding:11px 14px;color:rgba(255,255,255,.55);font-size:13px;font-weight:600;border-radius:12px;}
.logout-btn:hover{background:rgba(255,255,255,.06);color:#fff;}

.main-col{flex:1;min-width:0;display:flex;flex-direction:column;}
.topbar{
  display:flex;align-items:center;justify-content:space-between;padding:16px 28px;
  background:rgba(250,247,242,.9);backdrop-filter:blur(10px);position:sticky;top:0;z-index:40;
  border-bottom:1px solid var(--line);
}
.topbar h1{font-size:19px;font-weight:800;letter-spacing:-.01em;}
.topbar .section-sub{margin-top:0;}
.topbar-actions{display:flex;align-items:center;gap:10px;}
.icon-btn{
  width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  background:var(--card);border:1px solid var(--line);position:relative;transition:all .15s;
}
.icon-btn:hover{border-color:var(--accent);}
.icon-btn svg{width:19px;height:19px;}
.notif-dot{
  position:absolute;top:8px;right:9px;width:9px;height:9px;border-radius:50%;background:var(--accent);
  border:2px solid var(--paper);animation:pulse 2s infinite;
}
.mobile-menu-btn{display:none;}

main{flex:1;padding:24px 28px 100px;max-width:1180px;width:100%;}
.module{display:none;}
.module.active{display:block;animation:fadeUp .4s cubic-bezier(.22,1,.36,1) both;}

/* bottom nav (mobile) */
.bottom-nav{display:none;}

/* notification drawer */
.drawer-overlay{position:fixed;inset:0;background:rgba(20,20,26,.35);z-index:80;opacity:0;pointer-events:none;transition:opacity .25s;}
.drawer-overlay.show{opacity:1;pointer-events:auto;}
.drawer{
  position:fixed;top:0;right:0;height:100vh;width:100%;max-width:380px;background:var(--card);z-index:90;
  transform:translateX(100%);transition:transform .3s cubic-bezier(.22,1,.36,1);display:flex;flex-direction:column;
  box-shadow:var(--shadow-lg);
}
.drawer.show{transform:translateX(0);}
.drawer-head{padding:20px 20px 14px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;}
.drawer-body{flex:1;overflow-y:auto;padding:8px 14px 20px;}
.notif-item{display:flex;gap:12px;padding:14px 10px;border-radius:14px;transition:background .15s;}
.notif-item:hover{background:var(--paper-dim);}
.notif-item .dot{width:9px;height:9px;border-radius:50%;background:var(--accent);margin-top:6px;flex-shrink:0;}
.notif-item.read .dot{background:var(--line);}
.notif-item b{font-size:13.5px;display:block;}
.notif-item p{font-size:12.5px;color:var(--ink-fade);margin-top:2px;line-height:1.5;}
.notif-item time{font-size:11px;color:var(--ink-fade);opacity:.8;}

/* modal */
.modal-overlay{position:fixed;inset:0;background:rgba(20,20,26,.45);z-index:100;display:none;align-items:center;justify-content:center;padding:18px;}
.modal-overlay.show{display:flex;animation:fadeIn .2s ease;}
.modal{background:var(--card);border-radius:var(--radius-lg);width:100%;max-width:520px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg);}
.modal.modal-lg{max-width:820px;}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:22px 24px 0;}
.modal-head h3{font-size:18px;font-weight:800;}
.modal-close{width:34px;height:34px;border-radius:50%;background:var(--paper-dim);display:flex;align-items:center;justify-content:center;}
.modal-body{padding:18px 24px 24px;}
.modal-foot{padding:0 24px 24px;display:flex;gap:10px;justify-content:flex-end;}

table{width:100%;border-collapse:collapse;}
th{text-align:left;font-size:11.5px;text-transform:uppercase;letter-spacing:.04em;color:var(--ink-fade);padding:10px 12px;border-bottom:1.5px solid var(--line);}
td{padding:12px;border-bottom:1px solid var(--line);font-size:13.5px;}
tr:last-child td{border-bottom:none;}
.table-wrap{overflow-x:auto;border-radius:var(--radius-md);}

@media (max-width:900px){
  .sidebar{display:none;}
  main{padding:18px 16px 100px;}
  .topbar{padding:14px 16px;}
  .bottom-nav{
    display:flex;position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--line);
    z-index:50;padding:8px 6px calc(8px + env(safe-area-inset-bottom));box-shadow:0 -4px 20px rgba(20,20,26,.08);
  }
  .bottom-nav .nav-item{flex-direction:column;flex:1;text-align:center;font-size:10.5px;gap:4px;color:var(--ink-fade);padding:6px 2px;border-radius:12px;}
  .bottom-nav .nav-item.active{background:transparent;color:var(--accent);box-shadow:none;}
  .bottom-nav .nav-item svg{width:21px;height:21px;}
  .field-row{grid-template-columns:1fr 1fr;}
}
@media (max-width:520px){
  .field-row{grid-template-columns:1fr;}
}
</style>
</head>

function logoImg(variant, h){
  h = h || 40;
  const src = variant==='white' ? LOGO_WHITE : LOGO_BLACK;
  return `<img src="${src}" alt="Andersson Personal Trainer" style="height:${h}px;width:auto;display:block;">`;
}
function logoMarkSVG(color, w){
  color = color || '#14141a'; w = w || 44;
  return `<svg width="${w}" height="${w}" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
    <circle cx="20" cy="24" r="7.5" stroke="${color}" stroke-width="3.4"/>
    <rect x="16.5" y="30" width="7" height="13" rx="3" fill="${color}"/>
    <circle cx="38" cy="30" r="12" stroke="${color}" stroke-width="4"/>
    <rect x="32" y="41" width="12" height="16" rx="4.5" fill="${color}"/>
    <g stroke="${color}" stroke-width="3.4" stroke-linecap="round">
      <line x1="52" y1="20" x2="60" y2="12"/>
      <circle cx="61.5" cy="10.5" r="3" fill="${color}" stroke="none"/>
      <circle cx="50.5" cy="21.5" r="3" fill="${color}" stroke="none"/>
    </g>
  </svg>`;
}
function brandBlock(opts){
  opts = opts||{};
  const variant = opts.color==='#fff' ? 'white' : 'black';
  return `<div class="brand-mark">${logoImg(variant, opts.size||44)}</div>`;
}

function pad(n){return n<10?'0'+n:''+n;}
function isoDate(d){return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());}
function fmtFechaCorta(iso){const [y,m,d]=iso.split('-');return `${d}/${m}/${y}`;}
function fmtFechaLarga(iso){
  const meses=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  const [y,m,d]=iso.split('-').map(Number);
  return `${d} de ${meses[m-1]} de ${y}`;
}
function money(n){return '$ ' + Math.round(n).toLocaleString('es-CO');}

// Vuelve a renderizar preservando el foco/cursor de un input de búsqueda, para que no se
// pierda la posición del cursor al escribir (los módulos re-dibujan todo el HTML en cada tecla).
function reRenderPreserveFocus(renderFn, inputId){
  const active = document.activeElement;
  const hadFocus = active && active.id === inputId;
  const selStart = hadFocus ? active.selectionStart : null;
  const selEnd = hadFocus ? active.selectionEnd : null;
  renderFn();
  if(hadFocus){
    const el = document.getElementById(inputId);
    if(el){ el.focus(); if(selStart!=null) el.setSelectionRange(selStart, selEnd); }
  }
}

// Genera horario de la semana actual (lunes-sábado) con clases fijas por cliente/profesor
const today = new Date();
function mondayOfThisWeek(){
  const d = new Date(today);
  const day = d.getDay(); // 0=domingo
  const diff = day===0? -6 : 1-day;
  d.setDate(d.getDate()+diff);
  return d;
}
const weekStart = mondayOfThisWeek();
function dateForWeekday(offset){ // 0=lunes .. 5=sábado
  const d = new Date(weekStart);
  d.setDate(d.getDate()+offset);
  return isoDate(d);
}

// una vez el usuario empiece a usar la app en producción. HISTORIAL se va llenando solo, a partir

let HISTORIAL = [];

let NOTIFICACIONES = [];

let DOCS_ENVIADOS = [];

/* ---------- STATE ---------- */
let STATE = {
  user:null,
  module:'horario',
  viewProfesorId:null, // filtro admin
  // Antes quedaba fijo en '2026-07' (se habría quedado mostrando julio para siempre). Ahora se
  // calcula del mes real vigente cada vez que se carga la app, para que la cuenta de cobro y el
  // dashboard arranquen siempre en el mes en curso sin tener que cambiarlo a mano cada mes.
  invoiceMonth: isoDate(new Date()).slice(0,7),
  adminViewMode:'admin', // 'admin' = vista completa del negocio · 'profesor' = solo su propio trabajo (aplica solo a rol admin)
};
function isAdminOverview(){
  return STATE.user && STATE.user.rol==='admin' && STATE.adminViewMode==='admin';
}

/* ---------- PERSISTENCIA LOCAL (localStorage) ----------
   La app no tiene backend propio: sin esto, cualquier registro de sesión, reasignación de clase,
   cancelación, suspensión, cliente cerrado, etc. se perdía al recargar la página (era la causa
   real del bug reportado 22/07/2026: "eliminé los registros de Alberto pero al volver a ingresar
   salían de nuevo" — el array se reiniciaba con los datos de ejemplo cada vez que se cargaba el
   archivo). Ahora el estado mutable se guarda en el navegador y se recupera al abrir la app.
   IMPORTANTE — límite real de esta solución: localStorage es local a CADA navegador/dispositivo.
   Si Daniel registra una sesión desde su celular, ese registro no aparece automáticamente en el
   celular de Karen ni en el computador del administrador — cada quien ve lo que se guardó en su
   propio dispositivo. Para que los 3 usuarios compartan los mismos datos en tiempo real desde
   cualquier dispositivo hace falta un backend real (por ejemplo, Google Drive/Sheets como base de
   datos compartida vía la API de Google) — es un proyecto más grande, ya documentado como
   pendiente en contexto-proyecto.md, y queda como siguiente paso natural después de este parche. */
const STORAGE_KEY = 'andersson_app_state_v1';
function saveState(){
  try{
    const data = {
      REGISTROS, SCHEDULE, HISTORIAL, NOTIFICACIONES, DOCS_ENVIADOS, SUSPENSIONES, CLIENTES,
      invoiceCounter, savedAt: new Date().toISOString(),
    };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  }catch(e){ console.warn('No se pudo guardar el estado localmente:', e); }
}
function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return;
    const data = JSON.parse(raw);
    if(Array.isArray(data.REGISTROS)) REGISTROS = data.REGISTROS;
    if(Array.isArray(data.SCHEDULE)) SCHEDULE = data.SCHEDULE;
    if(Array.isArray(data.HISTORIAL)) HISTORIAL = data.HISTORIAL;
    if(Array.isArray(data.NOTIFICACIONES)) NOTIFICACIONES = data.NOTIFICACIONES;
    if(Array.isArray(data.DOCS_ENVIADOS)) DOCS_ENVIADOS = data.DOCS_ENVIADOS;
    if(Array.isArray(data.SUSPENSIONES)) SUSPENSIONES = data.SUSPENSIONES;
    if(Array.isArray(data.CLIENTES)) CLIENTES.splice(0, CLIENTES.length, ...data.CLIENTES);
    if(typeof data.invoiceCounter === 'number') invoiceCounter = data.invoiceCounter;
    // El horario guardado trae la fecha calculada en un momento anterior — se recalcula siempre
    // contra la semana real vigente al cargar, para que nunca quede desincronizado.
    SCHEDULE.forEach(s=>{ s.fecha = dateForWeekday(s.dia); });
  }catch(e){ console.warn('No se pudo cargar el estado guardado, se usan los datos iniciales:', e); }
}
window.addEventListener('beforeunload', saveState);
setInterval(saveState, 5000); // respaldo periódico, por si algún flujo no llama saveState() directamente

/* ---------- SESIÓN (mantener la sesión iniciada y recordar dónde estaba el usuario) ----------
   El usuario reportó que al darle "atrás" (en el celular) la app se salía por completo y pedía
   iniciar sesión de nuevo, perdiendo en qué pantalla estaba. Esto pasa porque, igual que con los
   datos (ver bloque de arriba), el usuario logueado (`STATE.user`) y el módulo activo no se
   guardaban en ningún lado — al recargar la página (que es lo que suele pasar con "atrás" en un
   navegador móvil sin backend real detrás), la app siempre arrancaba desde cero en la pantalla de
   login. Ahora la sesión (quién inició sesión, en qué módulo estaba, modo admin/profesor, filtro
   de profesor, cliente seleccionado en Sesiones) se guarda en localStorage y se restaura
   automáticamente al abrir la app, sin pedir credenciales de nuevo ni perder la pantalla en la
   que estaba, mientras sea el mismo navegador/dispositivo. */
const SESSION_KEY = 'andersson_session_v1';
function saveSession(){
  try{
    if(!STATE.user) return;
    localStorage.setItem(SESSION_KEY, JSON.stringify({
      userId: STATE.user.id,
      module: STATE.module,
      adminViewMode: STATE.adminViewMode,
      viewProfesorId: STATE.viewProfesorId,
      selectedClienteRegistro: typeof selectedClienteRegistro!=='undefined' ? selectedClienteRegistro : null,
    }));
  }catch(e){ console.warn('No se pudo guardar la sesión localmente:', e); }
}
function loadSession(){
  try{
    const raw = localStorage.getItem(SESSION_KEY);
    return raw ? JSON.parse(raw) : null;
  }catch(e){ return null; }
}
function clearSession(){
  try{ localStorage.removeItem(SESSION_KEY); }catch(e){}
}

/* ===================== GOOGLE DRIVE SYNC =====================
   Sincronización adicional y "best effort" entre profesores/administrador usando un Google Sheet
   por cliente, guardado dentro de la carpeta de Drive que ya existe para ese cliente (CLIENTES[i].drive).
   Esto NO reemplaza localStorage: si Drive no está conectado (driveConnected===false, el estado real
   mientras no se configure el OAuth Client ID de arriba), la app funciona exactamente igual que hoy,
   100% local. Cuando el administrador conecta su cuenta de Drive (botón "Conectar Google Drive"),
   cada registro de sesión que se guarda/completa/edita/elimina también se refleja en el Sheet del
   cliente, y ese Sheet se comparte automáticamente (permisos "writer", archivo por archivo — nunca
   la carpeta completa) con cada profesor asignado a ese cliente, para que un registro tomado desde
   el celular de un profesor aparezca también en el computador de otro profesor o del administrador.
   Ningún llamado de esta sección debe lanzar errores visibles al usuario ni bloquear el guardado
   local, que ya funciona sin esto. */
let driveAccessToken = null;
let driveConnected = false;

function connectGoogleDrive(){
  try{
    if(typeof google === 'undefined' || !google.accounts || !google.accounts.oauth2){
      toast('Google Identity Services no cargó todavía. Intenta de nuevo en un momento.', 'error');
      return;
    }
    const tokenClient = google.accounts.oauth2.initTokenClient({
      client_id: GOOGLE_CLIENT_ID,
      scope: 'https://www.googleapis.com/auth/drive',
      callback: (resp)=>{
        if(resp && resp.access_token){
          driveAccessToken = resp.access_token;
          driveConnected = true;
          toast('Google Drive conectado', 'success');
          renderDriveConnectUI();
          const cliente = (typeof selectedClienteRegistro!=='undefined' && selectedClienteRegistro) ? CLIENTES.find(c=>c.id===selectedClienteRegistro) : null;
          if(cliente) pullRegistrosForCliente(cliente).catch(e=>console.warn('Sync inicial de Drive falló:', e));
        } else {
          toast('No se pudo conectar Google Drive', 'error');
        }
      },
    });
    tokenClient.requestAccessToken();
  }catch(e){
    console.warn('connectGoogleDrive falló:', e);
    toast('No se pudo iniciar la conexión con Google Drive', 'error');
  }
}

// Refresca el pequeño bloque de UI (botón + estado) donde sea que esté renderizado. Se llama tanto
// desde bootApp (primer render) como después de conectar, para reflejar el estado actualizado.
function renderDriveConnectUI(){
  const wrap = document.getElementById('driveConnectWrap');
  if(!wrap) return;
  if(!(STATE.user && STATE.user.rol==='admin')){
    wrap.style.display = 'none';
    wrap.innerHTML = '';
    return;
  }
  wrap.style.display = 'flex';
  wrap.innerHTML = `
    <button type="button" class="btn btn-outline btn-sm" id="btnConnectDrive">${driveConnected? 'Reconectar Google Drive' : 'Conectar Google Drive'}</button>
    <span class="section-sub" style="font-size:11.5px;">${driveConnected? 'Drive conectado' : 'Drive no conectado'}</span>
  `;
  const btn = document.getElementById('btnConnectDrive');
  if(btn) btn.addEventListener('click', connectGoogleDrive);
}

async function driveApiFetch(url, options){
  if(!driveConnected) return null;
  try{
    const opts = Object.assign({}, options);
    opts.headers = Object.assign({}, (options && options.headers) || {}, {
      'Authorization': `Bearer ${driveAccessToken}`,
    });
    if(opts.body && typeof opts.body !== 'string'){
      opts.headers['Content-Type'] = 'application/json';
      opts.body = JSON.stringify(opts.body);
    }
    const res = await fetch(url, opts);
    if(!res.ok){
      console.warn('driveApiFetch: respuesta no OK', res.status, url);
      return null;
    }
    const text = await res.text();
    if(!text) return {};
    try{ return JSON.parse(text); }catch(e){ return {}; }
  }catch(e){
    console.warn('driveApiFetch falló:', e);
    return null;
  }
}

const REGISTRO_SHEET_HEADERS = ['id','clienteId','profesorId','fecha','mes','preSis','preSisNA','preDia','preDiaNA','prePpm','prePpmNA','preSpo2','preSpo2NA','postSis','postSisNA','postDia','postDiaNA','postPpm','postPpmNA','postSpo2','postSpo2NA','modalidad','detalle','estado','createdAt'];

function registroToRow(r){
  const mes = (r.fecha||'').slice(0,7);
  return REGISTRO_SHEET_HEADERS.map(k=>{
    if(k==='mes') return mes;
    const v = r[k];
    if(v===undefined || v===null) return '';
    if(typeof v==='boolean') return v ? 'TRUE' : 'FALSE';
    return v;
  });
}

function rowToRegistro(row, clienteId){
  const r = { clienteId };
  REGISTRO_SHEET_HEADERS.forEach((k, i)=>{
    if(k==='mes') return; // derivado, no se guarda en REGISTROS
    let v = row[i];
    if(v===undefined) v = '';
    if(/NA$/.test(k)){ r[k] = (v===true || v==='TRUE' || v===true); }
    else if(['preSis','preDia','prePpm','preSpo2','postSis','postDia','postPpm','postSpo2'].includes(k)){
      r[k] = (v==='' || v===undefined || v===null) ? '' : Number(v);
    } else {
      r[k] = v;
    }
  });
  return r;
}

// Evita condición de carrera: si dos llamadas (ej. guardar un registro y refrescar la vista del
// cliente) piden el Excel de un mismo cliente casi al mismo tiempo, ambas verían "no existe
// todavía" y crearían un archivo cada una, duplicando el Excel. Este mapa guarda la promesa en
// curso por cliente, así la segunda llamada espera el mismo resultado en vez de crear otro.
const _sheetCreationInFlight = {};
async function findOrCreateRegistroSheet(cliente){
  if(!driveConnected) return null;
  if(cliente.sheetId) return cliente.sheetId;
  if(_sheetCreationInFlight[cliente.id]) return _sheetCreationInFlight[cliente.id];
  const promise = _findOrCreateRegistroSheetInner(cliente).finally(()=>{
    delete _sheetCreationInFlight[cliente.id];
  });
  _sheetCreationInFlight[cliente.id] = promise;
  return promise;
}
async function _findOrCreateRegistroSheetInner(cliente){
  try{
    const sheetName = `Registro_${cliente.nombre}`;
    const q = encodeURIComponent(`'${cliente.drive}' in parents and name='${sheetName}' and trashed=false`);
    const listRes = await driveApiFetch(`https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id,name)`, { method:'GET' });
    if(listRes && Array.isArray(listRes.files) && listRes.files.length){
      cliente.sheetId = listRes.files[0].id;
      saveState();
      return cliente.sheetId;
    }
    // No existe todavía: se crea el spreadsheet con la fila de encabezados.
    const createRes = await driveApiFetch('https://sheets.googleapis.com/v4/spreadsheets', {
      method:'POST',
      body: {
        properties: { title: sheetName },
        sheets: [{ properties:{ title:'Registros' }, data:[{ startRow:0, startColumn:0, rowData:[{ values: REGISTRO_SHEET_HEADERS.map(h=>({ userEnteredValue:{ stringValue:h } })) }] }] }],
      },
    });
    if(!createRes || !createRes.spreadsheetId) return null;
    const newSheetId = createRes.spreadsheetId;
    // Asegura la fila de encabezados también vía values.update (por si el body de creación no la aplicó).
    await driveApiFetch(`https://sheets.googleapis.com/v4/spreadsheets/${newSheetId}/values/A1:Z1?valueInputOption=RAW`, {
      method:'PUT',
      body: { range:'A1:Z1', majorDimension:'ROWS', values:[REGISTRO_SHEET_HEADERS] },
    });
    // Mueve el archivo (creado por defecto en la raíz de "Mi unidad") a la carpeta del cliente.
    const meta = await driveApiFetch(`https://www.googleapis.com/drive/v3/files/${newSheetId}?fields=parents`, { method:'GET' });
    const prevParents = (meta && Array.isArray(meta.parents)) ? meta.parents.join(',') : '';
    await driveApiFetch(`https://www.googleapis.com/drive/v3/files/${newSheetId}?addParents=${encodeURIComponent(cliente.drive)}${prevParents?`&removeParents=${encodeURIComponent(prevParents)}`:''}`, {
      method:'PATCH',
      body: {},
    });
    cliente.sheetId = newSheetId;
    saveState();
    autoShareClienteSheet(cliente, newSheetId).catch(e=>console.warn('autoShareClienteSheet falló:', e));
    return newSheetId;
  }catch(e){
    console.warn('findOrCreateRegistroSheet falló:', e);
    return null;
  }
}

async function autoShareClienteSheet(cliente, sheetId){
  if(!driveConnected) return;
  try{
    const profesorIds = new Set(SCHEDULE.filter(s=>s.clienteId===cliente.id).map(s=>s.profesorId));
    const ownerEmail = (STATE.user && STATE.user.rol==='admin') ? STATE.user.usuario : null;
    for(const pid of profesorIds){
      const u = USERS.find(x=>x.id===pid);
      const email = u && u.usuario;
      if(!email) continue;
      if(ownerEmail && email===ownerEmail) continue; // el dueño de la hoja ya tiene acceso total
      try{
        await driveApiFetch(`https://www.googleapis.com/drive/v3/files/${sheetId}/permissions?sendNotificationEmail=false`, {
          method:'POST',
          body: { role:'writer', type:'user', emailAddress: email },
        });
      }catch(e){
        console.warn(`No se pudo compartir el Sheet de ${cliente.nombre} con ${email}:`, e);
      }
    }
  }catch(e){
    console.warn('autoShareClienteSheet falló:', e);
  }
}

// Busca (o crea) la subcarpeta del año dentro de la carpeta de Drive del cliente — ej. carpeta
// "2026" dentro de la carpeta de Elisa Shlegel — para guardar ahí la cuenta de cobro de ese año.
async function findOrCreateYearFolder(cliente, year){
  if(!driveConnected) return null;
  try{
    const q = encodeURIComponent(`'${cliente.drive}' in parents and name='${year}' and mimeType='application/vnd.google-apps.folder' and trashed=false`);
    const listRes = await driveApiFetch(`https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id,name)`, { method:'GET' });
    if(listRes && Array.isArray(listRes.files) && listRes.files.length) return listRes.files[0].id;
    const createRes = await driveApiFetch('https://www.googleapis.com/drive/v3/files', {
      method:'POST',
      body: { name:String(year), mimeType:'application/vnd.google-apps.folder', parents:[cliente.drive] },
    });
    return createRes ? createRes.id : null;
  }catch(e){
    console.warn('findOrCreateYearFolder falló:', e);
    return null;
  }
}

// Sube (o reemplaza si ya existe) un archivo binario dentro de una carpeta de Drive específica.
// Usa upload multipart (metadata + contenido en una sola petición) porque driveApiFetch solo maneja
// JSON — aquí necesitamos mandar el PDF como bytes crudos junto con su nombre.
async function uploadFileToDriveFolder(folderId, filename, blob, mimeType, existingFileId){
  if(!driveConnected) return null;
  try{
    const metadata = existingFileId ? { name: filename } : { name: filename, parents:[folderId] };
    const boundary = 'appprofes_' + Date.now();
    const encoder = new TextEncoder();
    const metadataPart = encoder.encode(`--${boundary}\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n${JSON.stringify(metadata)}\r\n`);
    const mediaHeader = encoder.encode(`--${boundary}\r\nContent-Type: ${mimeType}\r\n\r\n`);
    const closeDelim = encoder.encode(`\r\n--${boundary}--`);
    const mediaBytes = new Uint8Array(await blob.arrayBuffer());
    const body = new Blob([metadataPart, mediaHeader, mediaBytes, closeDelim]);
    const url = existingFileId
      ? `https://www.googleapis.com/upload/drive/v3/files/${existingFileId}?uploadType=multipart`
      : 'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart';
    const res = await fetch(url, {
      method: existingFileId ? 'PATCH' : 'POST',
      headers: { 'Authorization': `Bearer ${driveAccessToken}`, 'Content-Type': `multipart/related; boundary=${boundary}` },
      body,
    });
    if(!res.ok){ console.warn('uploadFileToDriveFolder: respuesta no OK', res.status); return null; }
    return await res.json();
  }catch(e){
    console.warn('uploadFileToDriveFolder falló:', e);
    return null;
  }
}

// Guarda de verdad el PDF de la cuenta de cobro en Drive/[Cliente]/[Año]/[Mes_Cliente].pdf. Si ya
// existe un PDF con ese mismo nombre en esa carpeta (ej. se volvió a generar la cuenta del mismo
// mes tras una corrección), lo reemplaza en vez de crear un duplicado. Devuelve true/false según
// si el guardado real se completó — el llamador decide qué avisarle al usuario según el resultado.
async function guardarPDFEnDriveReal(inv, filename, blob){
  if(!driveConnected) return false;
  try{
    const cliente = inv.cliente;
    if(!cliente || !cliente.drive) return false;
    const year = STATE.invoiceMonth.split('-')[0];
    const folderId = await findOrCreateYearFolder(cliente, year);
    if(!folderId) return false;
    const q = encodeURIComponent(`'${folderId}' in parents and name='${filename}' and trashed=false`);
    const listRes = await driveApiFetch(`https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id,name)`, { method:'GET' });
    const existingId = (listRes && Array.isArray(listRes.files) && listRes.files.length) ? listRes.files[0].id : null;
    const result = await uploadFileToDriveFolder(folderId, filename, blob, 'application/pdf', existingId);
    return !!result;
  }catch(e){
    console.warn('guardarPDFEnDriveReal falló:', e);
    return false;
  }
}

async function appendRegistroToSheet(cliente, registro){
  if(!driveConnected) return null;
  try{
    const sheetId = await findOrCreateRegistroSheet(cliente);
    if(!sheetId) return null;
    return await driveApiFetch(`https://sheets.googleapis.com/v4/spreadsheets/${sheetId}/values/A:Z:append?valueInputOption=RAW`, {
      method:'POST',
      body: { range:'A:Z', majorDimension:'ROWS', values:[registroToRow(registro)] },
    });
  }catch(e){
    console.warn('appendRegistroToSheet falló:', e);
    return null;
  }
}

async function updateRegistroRowInSheet(cliente, registro){
  if(!driveConnected) return null;
  try{
    const sheetId = await findOrCreateRegistroSheet(cliente);
    if(!sheetId) return null;
    const data = await driveApiFetch(`https://sheets.googleapis.com/v4/spreadsheets/${sheetId}/values/A:Z`, { method:'GET' });
    const values = (data && data.values) || [];
    const rowIdx = values.findIndex(row=>row[0]===registro.id);
    if(rowIdx<0){
      return await appendRegistroToSheet(cliente, registro);
    }
    const rowNumber = rowIdx+1; // 1-indexed, incluye encabezado en fila 1
    return await driveApiFetch(`https://sheets.googleapis.com/v4/spreadsheets/${sheetId}/values/A${rowNumber}:Z${rowNumber}?valueInputOption=RAW`, {
      method:'PUT',
      body: { range:`A${rowNumber}:Z${rowNumber}`, majorDimension:'ROWS', values:[registroToRow(registro)] },
    });
  }catch(e){
    console.warn('updateRegistroRowInSheet falló:', e);
    return null;
  }
}

async function deleteRegistroRowInSheet(cliente, registroId){
  if(!driveConnected) return null;
  try{
    const sheetId = await findOrCreateRegistroSheet(cliente);
    if(!sheetId) return null;
    const data = await driveApiFetch(`https://sheets.googleapis.com/v4/spreadsheets/${sheetId}/values/A:Z`, { method:'GET' });
    const values = (data && data.values) || [];
    const rowIdx = values.findIndex(row=>row[0]===registroId);
    if(rowIdx<0) return null;
    const meta = await driveApiFetch(`https://sheets.googleapis.com/v4/spreadsheets/${sheetId}?fields=sheets.properties`, { method:'GET' });
    const sheetProps = meta && meta.sheets && meta.sheets[0] && meta.sheets[0].properties;
    const gridSheetId = sheetProps ? sheetProps.sheetId : 0;
    return await driveApiFetch(`https://sheets.googleapis.com/v4/spreadsheets/${sheetId}:batchUpdate`, {
      method:'POST',
      body: { requests:[{ deleteDimension:{ range:{ sheetId: gridSheetId, dimension:'ROWS', startIndex: rowIdx, endIndex: rowIdx+1 } } }] },
    });
  }catch(e){
    console.warn('deleteRegistroRowInSheet falló:', e);
    return null;
  }
}

async function pullRegistrosForCliente(cliente){
  if(!driveConnected || !cliente) return;
  try{
    const sheetId = await findOrCreateRegistroSheet(cliente);
    if(!sheetId) return;
    const data = await driveApiFetch(`https://sheets.googleapis.com/v4/spreadsheets/${sheetId}/values/A:Z`, { method:'GET' });
    const values = (data && data.values) || [];
    const dataRows = values.slice(1); // fila 0 = encabezados
    dataRows.forEach(row=>{
      if(!row || !row[0]) return;
      const remote = rowToRegistro(row, cliente.id);
      const localIdx = REGISTROS.findIndex(r=>r.id===remote.id);
      if(localIdx<0){
        REGISTROS.push(remote);
      } else {
        const local = REGISTROS[localIdx];
        const same = JSON.stringify(local) === JSON.stringify(Object.assign({}, local, remote));
        if(!same) REGISTROS[localIdx] = Object.assign({}, local, remote);
      }
    });
    saveState();
    if(typeof selectedClienteRegistro!=='undefined' && selectedClienteRegistro===cliente.id && document.getElementById('tablaRegistro')){
      renderTablaRegistro();
    }
  }catch(e){
    console.warn('pullRegistrosForCliente falló (se ignora, sigue funcionando localmente):', e);
  }
}

/* ---------- TOAST ---------- */
function toast(msg, type){
  const host = document.getElementById('toastHost');
  const el = document.createElement('div');
  el.className = 'toast' + (type?(' '+type):'');
  el.innerHTML = (type==='success'?ICONS.check:type==='error'?ICONS.alert:'') && `<span style="width:15px;height:15px;display:inline-flex">${type==='success'?ICONS.check:type==='error'?ICONS.alert:''}</span>` + msg;
  if(!el.innerHTML) el.textContent = msg;
  host.appendChild(el);
  setTimeout(()=>{ el.style.transition='opacity .3s, transform .3s'; el.style.opacity='0'; el.style.transform='translateY(-10px)'; setTimeout(()=>el.remove(),300); }, 3200);
}

  {id:'horario', label:'Horario', icon:ICONS.calendar, roles:['profesor','admin']},

];
function modTitles(id){

    registro:{t:'Registro de sesiones', s: overview? 'Signos vitales, seguimiento y cuentas de cobro de todos los clientes' : 'Signos vitales y seguimiento de tus clientes'},
    suspensiones:{t:'Suspensión temporal de sesiones', s: overview? 'Vacaciones, enfermedad u otros motivos — de todos los clientes' : 'Registra cuando un cliente no tomará clases por un periodo'},
    docs:{t:'Documentación del mes', s: overview? 'Documentos enviados por todos los profesores' : 'Envía tus documentos mensuales'},

function bootApp(startModule){
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('app').classList.add('active');
  // Si viene de una sesión restaurada ya trae un adminViewMode guardado (admin/profesor) — solo
  // se fuerza a 'admin' por defecto en un login nuevo.
  if(!STATE.adminViewMode) STATE.adminViewMode = 'admin';
  const items = NAV_ITEMS.filter(n=>n.roles.includes(STATE.user.rol));

  const navHTML = items.map(n=>`<button class="nav-item" data-mod="${n.id}"><span style="width:19px;height:19px;display:inline-flex">${n.icon}</span>${n.label}</button>`).join('');

  document.getElementById('sidebarNav').innerHTML = `
    ${brandBlock({color:'#fff', size:104})}
    <div style="margin-top:10px;">${navHTML}</div>
    <div class="nav-spacer"></div>
    <div class="sidebar-user">
      <div class="avatar">${initials(STATE.user.nombre)}</div>
      <div class="who"><b>${STATE.user.nombre}</b><span>${STATE.user.rol==='admin'?'Administrador':'Profesor'}</span></div>
    </div>
    <button class="logout-btn" id="btnLogout"><span style="width:17px;height:17px;display:inline-flex">${ICONS.logout}</span>Cerrar sesión</button>
  `;
  document.getElementById('bottomNav').innerHTML = items.map(n=>`<button class="nav-item" data-mod="${n.id}"><span style="width:21px;height:21px;display:inline-flex">${n.icon}</span>${n.label}</button>`).join('');

  document.querySelectorAll('.nav-item[data-mod]').forEach(b=>{
    b.addEventListener('click', ()=>switchModule(b.dataset.mod));
  });
  document.getElementById('btnLogout').addEventListener('click', logout);
  document.getElementById('btnNotif').addEventListener('click', openDrawer);
  document.getElementById('closeDrawer').addEventListener('click', closeDrawer);
  document.getElementById('drawerOverlay').addEventListener('click', closeDrawer);

  const toggleWrap = document.getElementById('adminModeToggle');
  if(STATE.user.rol==='admin'){
    toggleWrap.style.display = 'flex';
    toggleWrap.innerHTML = `
      <button type="button" data-mode="admin" class="${STATE.adminViewMode!=='profesor'?'active':''}" style="padding:8px 14px;">Administrador</button>
      <button type="button" data-mode="profesor" class="${STATE.adminViewMode==='profesor'?'active':''}" style="padding:8px 14px;">Profesor</button>
    `;
    toggleWrap.querySelectorAll('button').forEach(b=>{
      b.addEventListener('click', ()=>{
        STATE.adminViewMode = b.dataset.mode;
        toggleWrap.querySelectorAll('button').forEach(x=>x.classList.toggle('active', x===b));
        toast(b.dataset.mode==='admin' ? 'Vista de administrador: ves todo el negocio' : 'Vista de profesor: solo tu propio trabajo', 'success');
        switchModule(STATE.module);
      });
    });
  } else {
    toggleWrap.style.display = 'none';
  }

  renderDriveConnectUI();

  switchModule(startModule || 'horario');
  renderNotifDrawer();
}

function initials(name){
  return name.split(' ').filter(Boolean).slice(0,2).map(w=>w[0]).join('').toUpperCase();
}

function logout(){
  STATE.user = null;
  clearSession();
  document.getElementById('app').classList.remove('active');
  document.getElementById('loginScreen').style.display='flex';
  renderLogin();
  toast('Sesión cerrada');
}

function switchModule(id){
  STATE.module = id;
  saveSession();
  document.querySelectorAll('.module').forEach(m=>m.classList.remove('active'));
  document.getElementById('mod-'+id).classList.add('active');
  document.querySelectorAll('.nav-item[data-mod]').forEach(b=>b.classList.toggle('active', b.dataset.mod===id));
  const t = modTitles(id);
  document.getElementById('topbarTitle').textContent = t.t;
  document.getElementById('topbarSub').textContent = t.s;
  if(id==='horario') renderHorario();
  if(id==='registro') renderRegistro();
  if(id==='suspensiones') renderSuspensiones();
  if(id==='docs') renderDocs();
  if(id==='clientes') renderClientes();
  if(id==='disponibilidad') renderDisponibilidad();
}

/* ===================== MODULO 1: HORARIO ===================== */
const DIAS = ['Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
const CANCEL_META = {
  anticipada:{label:'Cancelación anticipada', cls:'pill-warning'},
  sobre_tiempo:{label:'Cancelación sobre tiempo', cls:'pill-danger'},
  programada:{label:'Cancelación programada', cls:'pill-gray'},
};

/* ---------- SUSPENSIÓN TEMPORAL DE SESIONES ---------- */
// Registro de clientes que no van a tomar clases por un rango de fechas (vacaciones, enfermedad, u otro
// motivo) — a diferencia de una cancelación puntual de una sola clase, esto aplica automáticamente a
// TODAS las clases de ese cliente dentro del rango (no cuenta contra su cupo mensual de cancelaciones).
const SUSPENSION_META = {
  vacaciones:{label:'Vacaciones', cls:'pill-accent'},
  enfermedad:{label:'Enfermedad', cls:'pill-danger'},
  otro:{label:'Otro motivo', cls:'pill-gray'},
};
let SUSPENSIONES = [];

function suspensionActiva(clienteId, fechaISO){
  return SUSPENSIONES.find(sp => sp.clienteId===clienteId && fechaISO>=sp.fechaInicio && fechaISO<=sp.fechaFin) || null;
}

function clienteNombre(id){ const c = CLIENTES.find(x=>x.id===id); return c? c.nombre : id; }
function fmtEdad(c){ return c.edad==='Pendiente' ? 'Edad pendiente' : c.edad+' años'; }
function fmtCC(c){ return c.cc==='Pendiente' ? 'CC pendiente' : 'CC '+c.cc; }
function profesorNombre(id){ const p = PROFESORES.find(x=>x.id===id); return p? p.nombre : id; }

function renderHorario(){
  const el = document.getElementById('mod-horario');
  const overview = isAdminOverview();
  if(overview && STATE.viewProfesorId===null) STATE.viewProfesorId = 'all';

  let list = SCHEDULE.filter(s => overview ? true : s.profesorId===STATE.user.id);
  if(overview && STATE.viewProfesorId!=='all') list = list.filter(s=>s.profesorId===STATE.viewProfesorId);

  const byDay = {};
  list.forEach(s=>{ (byDay[s.dia] = byDay[s.dia]||[]).push(s); });

  el.innerHTML = `
    <div class="fade-up" style="display:flex;flex-wrap:wrap;gap:12px;align-items:center;justify-content:space-between;margin-bottom:18px;">
      <div class="card" style="padding:12px 16px;display:flex;gap:10px;align-items:center;">
        <span style="width:17px;height:17px;color:var(--accent);display:inline-flex">${ICONS.calendar}</span>
        <span style="font-size:13.5px;font-weight:600;">Semana del ${fmtFechaCorta(dateForWeekday(0))} al ${fmtFechaCorta(dateForWeekday(5))}</span>
      </div>
      <div style="display:flex;gap:10px;align-items:center;">
        ${overview ? `<button class="btn btn-primary btn-sm" id="btnAgendarMasaje" onclick="openAgendarMasajeModal()"><span style="width:14px;height:14px;display:inline-flex">${ICONS.plus}</span>Agendar masaje</button>` : ''}
        ${overview ? `
        <select id="filtroProfesor" class="card" style="padding:11px 14px;border:1px solid var(--line);font-weight:600;font-size:13.5px;">
          <option value="all">Todos los profesores</option>
          ${PROFESORES.map(p=>`<option value="${p.id}" ${STATE.viewProfesorId===p.id?'selected':''}>${p.nombre}</option>`).join('')}
        </select>` : ''}
      </div>
    </div>
    <div style="display:flex;flex-direction:column;gap:22px;">
      ${DIAS.map((dname,di)=>{
        const items = (byDay[di]||[]).sort((a,b)=>a.hora.localeCompare(b.hora));
        if(!items.length) return '';
        return `
        <div class="fade-up">
          <div style="display:flex;align-items:baseline;gap:8px;margin-bottom:10px;">
            <h3 style="font-size:15px;font-weight:800;">${dname}</h3>
            <span class="section-sub">${fmtFechaCorta(dateForWeekday(di))}</span>
          </div>
          <div style="display:flex;flex-direction:column;gap:10px;">
            ${items.map(s=>claseCardHTML(s)).join('')}
          </div>
        </div>`;
      }).join('') || `<div class="card" style="padding:40px;text-align:center;color:var(--ink-fade);">No hay clases programadas para este filtro.</div>`}
    </div>
  `;

  if(overview){
    document.getElementById('filtroProfesor').addEventListener('change', e=>{
      STATE.viewProfesorId = e.target.value;
      renderHorario();
    });
  }
  document.querySelectorAll('[data-clase]').forEach(card=>{
    card.addEventListener('click', ()=> openCancelModal(card.dataset.clase));
  });
}
// (los bloques especiales — Desplazamiento/Disponible/Almuerzo — no llevan data-clase, así que no son clickeables ni cancelables)

// Colores tomados tal cual del Excel real "Horarios Profesores" de Drive (relleno de celdas):
// azul #C9DAF8 = clases presenciales, naranja #FF9900 = clases virtuales, amarillo #FFF2CC = desplazamiento,
// verde #D9EAD3 = disponible, rosado #D5A6BD = masaje. Actualizado 22/07/2026: Drive ya agregó su propio
// color de leyenda para "Masaje" (antes no existía y se había inventado un morado provisional) — se
// reemplazó por el rosado real #D5A6BD para que coincida exactamente con lo que aparece en Drive.
const BLOQUE_ESPECIAL_META = {
  Desplazamiento: {label:'Desplazamiento', icon:'🚗', bg:'#FFF2CC', color:'#7F6000', bar:'#F1C232'},
  Disponible: {label:'Disponible', icon:'✓', bg:'#D9EAD3', color:'#274E13', bar:'#6AA84F'},
  Almuerzo: {label:'Almuerzo', icon:'🍽️', bg:'var(--paper-dim)', color:'var(--ink-fade)', bar:'var(--line)'},
};

// Categoría de cada sesión con cliente, según el mismo código de colores del Excel de Drive.
const TIPO_SESION_META = {
  presencial: {label:'Presencial', bg:'#C9DAF8', color:'#1C4587', bar:'#3C78D8'},
  virtual:    {label:'Virtual',    bg:'#FCE5CD', color:'#B45F06', bar:'#FF9900'},
  masaje:     {label:'Masaje',     bg:'#D5A6BD', color:'#741B47', bar:'#A64D79'},
};
function categoriaSesion(tipo){
  const t = (tipo||'').toLowerCase();
  if(t.includes('masaje')) return TIPO_SESION_META.masaje;
  if(t.includes('online') || t.includes('virtual')) return TIPO_SESION_META.virtual;
  return TIPO_SESION_META.presencial;
}

function claseCardHTML(s){
  // Bloques especiales leídos tal cual de Drive (no son una clase de un cliente): Desplazamiento, Disponible, Almuerzo.
  if(!s.clienteId && BLOQUE_ESPECIAL_META[s.tipo]){
    const m = BLOQUE_ESPECIAL_META[s.tipo];
    return `
    <div class="card" style="padding:14px 16px;display:flex;align-items:center;gap:14px;background:${m.bg};border:1.5px dashed var(--line);">
      <div style="width:54px;flex-shrink:0;text-align:center;">
        <div style="font-weight:800;font-size:14.5px;color:${m.color};">${s.hora}${s.horaFin?'–'+s.horaFin:''}</div>
      </div>
      <div style="width:3px;align-self:stretch;border-radius:3px;background:${m.bar};"></div>
      <div style="flex:1;min-width:0;">
        <div style="font-weight:700;font-size:14.5px;color:${m.color};">${m.icon} ${m.label}</div>
        ${isAdminOverview()?`<div class="section-sub" style="margin-top:1px;">${profesorNombre(s.profesorId)}</div>`:''}
      </div>
    </div>`;
  }
  const cancelada = s.estado==='cancelada';
  const meta = cancelada ? CANCEL_META[s.tipoCancelacion] : null;
  if(cancelada){
    // El espacio queda visualmente disponible para profesor y administrador; el cliente/motivo
    // original se conserva como trazabilidad (para la cuenta de cobro) pero ya no ocupa el turno.
    return `
    <div class="card" data-clase="${s.id}" style="padding:14px 16px;display:flex;align-items:center;gap:14px;cursor:pointer;border:1.5px dashed var(--line);background:var(--paper-dim);transition:box-shadow .15s;" onmouseover="this.style.boxShadow='var(--shadow-md)'" onmouseout="this.style.boxShadow='none'">
      <div style="width:66px;flex-shrink:0;text-align:center;">
        <div style="font-weight:800;font-size:13.5px;color:var(--ink-fade);">${s.hora}${s.horaFin?'–'+s.horaFin:''}</div>
      </div>
      <div style="width:3px;align-self:stretch;border-radius:3px;background:var(--success);"></div>
      <div style="flex:1;min-width:0;">
        <div style="font-weight:700;font-size:14.5px;color:var(--success);">Espacio disponible</div>
        <div class="section-sub" style="margin-top:1px;">${s.tipo} · ${s.lugar}${isAdminOverview()?' · '+profesorNombre(s.profesorId):''}</div>
        <div style="margin-top:6px;font-size:12px;color:var(--ink-fade);">Antes: ${clienteNombre(s.clienteId)} — ${meta.label.toLowerCase()} el ${s.fechaHoraCancelacion? new Date(s.fechaHoraCancelacion).toLocaleString('es-CO',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}) : ''} · "${s.observacion||''}"</div>
      </div>
      <span class="pill" style="background:var(--success-light);color:var(--success);">Disponible</span>
    </div>`;
  }
  // Si el cliente tiene una suspensión temporal activa que cubre esta fecha (vacaciones/enfermedad/otro),
  // el espacio se muestra disponible igual que una cancelación puntual, pero sin contar contra su cupo mensual.
  const susp = suspensionActiva(s.clienteId, s.fecha);
  if(susp){
    const sm = SUSPENSION_META[susp.motivo];
    return `
    <div class="card" style="padding:14px 16px;display:flex;align-items:center;gap:14px;border:1.5px dashed var(--line);background:var(--paper-dim);">
      <div style="width:66px;flex-shrink:0;text-align:center;">
        <div style="font-weight:800;font-size:13.5px;color:var(--ink-fade);">${s.hora}${s.horaFin?'–'+s.horaFin:''}</div>
      </div>
      <div style="width:3px;align-self:stretch;border-radius:3px;background:var(--success);"></div>
      <div style="flex:1;min-width:0;">
        <div style="font-weight:700;font-size:14.5px;color:var(--success);">Espacio disponible</div>
        <div class="section-sub" style="margin-top:1px;">${s.tipo} · ${s.lugar}${isAdminOverview()?' · '+profesorNombre(s.profesorId):''}</div>
        <div style="margin-top:6px;font-size:12px;color:var(--ink-fade);">Antes: ${clienteNombre(s.clienteId)} — suspendido por ${sm.label.toLowerCase()} (${fmtFechaCorta(susp.fechaInicio)} al ${fmtFechaCorta(susp.fechaFin)})${susp.observacion?' · "'+susp.observacion+'"':''}</div>
      </div>
      <span class="pill ${sm.cls}">${sm.label}</span>
    </div>`;
  }
  const reasignada = !!s.asignadoPorAdmin;
  const cat = categoriaSesion(s.tipo);
  return `
  <div class="card" data-clase="${s.id}" style="padding:14px 16px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:box-shadow .15s,border-color .15s;${reasignada?'border-color:var(--accent);':''}" onmouseover="this.style.boxShadow='var(--shadow-md)'" onmouseout="this.style.boxShadow='var(--shadow-sm)'">
    <div style="width:66px;flex-shrink:0;text-align:center;">
      <div style="font-weight:800;font-size:13.5px;">${s.hora}${s.horaFin?'–'+s.horaFin:''}</div>
    </div>
    <div style="width:3px;align-self:stretch;border-radius:3px;background:${cat.bar};"></div>
    <div style="flex:1;min-width:0;">
      <div style="font-weight:700;font-size:14.5px;">${clienteNombre(s.clienteId)}</div>
      <div class="section-sub" style="margin-top:1px;">${s.tipo} · ${s.lugar}${isAdminOverview()?' · '+profesorNombre(s.profesorId):''}</div>
      <div style="margin-top:6px;">
        <span class="pill" style="background:${cat.bg};color:${cat.color};font-weight:700;">${cat.label}</span>
      </div>
      ${reasignada?`<div style="margin-top:4px;font-size:11.5px;font-weight:700;color:var(--accent);">Asignación por administrador${s.profesorOriginalId?' · antes: '+profesorNombre(s.profesorOriginalId):''}</div>`:''}
    </div>
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;">
      <span class="pill pill-teal">Programada</span>
      ${isAdminOverview()?`<button class="btn btn-outline" style="padding:4px 10px;font-size:11.5px;" data-reasignar="${s.id}" onclick="event.stopPropagation();openReasignarModal('${s.id}')">Reasignar profesor</button>`:''}
    </div>
  </div>`;
}

function openReasignarModal(id){
  const s = SCHEDULE.find(x=>x.id===id);
  if(!s) return;
  const opciones = PROFESORES.filter(p=>p.id!==s.profesorId);
  openModal(`
    <div class="modal-head">
      <h3>Reasignar clase a otro profesor</h3>
      <button class="modal-close" onclick="closeModal()">${ICONS.x.replace('viewBox','width="15" height="15" viewBox')}</button>
    </div>
    <div class="modal-body">
      <div class="card" style="padding:14px;margin-bottom:16px;background:var(--paper-dim);border:none;">
        <div style="font-weight:700;">${clienteNombre(s.clienteId)}</div>
        <div class="section-sub">${DIAS[s.dia]} ${fmtFechaCorta(s.fecha)} · ${s.hora}${s.horaFin?'–'+s.horaFin:''} · ${s.tipo}</div>
        <div class="section-sub" style="margin-top:4px;">Profesor actual: <strong>${profesorNombre(s.profesorId)}</strong></div>
      </div>
      <form id="reasignarForm">
        <div class="field">
          <label>Asignar a <span class="req">*</span></label>
          <select id="rProfesor" required>
            <option value="">Selecciona un profesor…</option>
            ${opciones.map(p=>`<option value="${p.id}">${p.nombre}</option>`).join('')}
          </select>
        </div>
        <div class="field">
          <label>Día <span class="req">*</span></label>
          <select id="rDia" required>
            ${DIAS.map((dname,di)=>`<option value="${di}" ${di===s.dia?'selected':''}>${dname}</option>`).join('')}
          </select>
        </div>
        <div class="field">
          <label>Hora <span class="req">*</span></label>
          <input type="time" id="rHora" value="${s.hora}" required>
        </div>
      </form>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" id="btnConfirmReasignar">Confirmar asignación</button>
    </div>
  `);
  document.getElementById('btnConfirmReasignar').addEventListener('click', ()=>{
    const form = document.getElementById('reasignarForm');
    if(!form.reportValidity()) return;
    const nuevoProfesorId = document.getElementById('rProfesor').value;
    const nuevoDia = Number(document.getElementById('rDia').value);
    const nuevaHora = document.getElementById('rHora').value;
    const anteriorProfesorId = s.profesorId;
    const anteriorDia = s.dia, anteriorHora = s.hora;
    if(!s.profesorOriginalId) s.profesorOriginalId = anteriorProfesorId;
    s.profesorId = nuevoProfesorId;
    if(s.horaFin){ s.horaFin = calcHoraFin(nuevaHora, 60); }
    s.dia = nuevoDia;
    s.hora = nuevaHora;
    s.fecha = dateForWeekday(nuevoDia);
    s.asignadoPorAdmin = true;
    const detalleCambio = (nuevoDia!==anteriorDia || nuevaHora!==anteriorHora)
      ? ` y movida a ${DIAS[nuevoDia]} ${nuevaHora}`
      : '';
    NOTIFICACIONES.unshift({id:'n'+Date.now(), titulo:'Clase asignada por administrador', cuerpo:`${clienteNombre(s.clienteId)} — ${DIAS[anteriorDia]} ${anteriorHora}, reasignada de ${profesorNombre(anteriorProfesorId)} a ${profesorNombre(nuevoProfesorId)}${detalleCambio} por ${STATE.user.nombre}.`, hora:'Ahora', leido:false});
    renderNotifDrawer();
    closeModal();
    renderHorario();
    toast(`Clase asignada a ${profesorNombre(nuevoProfesorId)}.`, 'success');
  });
}

/* ===================== MODULO 1C: DISPONIBILIDAD (reporte diario para administrador) =====================
   La app es un archivo HTML sin backend propio, así que no puede "despertarse" sola cada día a enviar un
   correo real — esto es una vista previa de cómo se vería ese reporte diario. El botón "Simular envío" imita
   el mismo patrón ya usado en el panel de Documentación (donde el envío de documentos también es simulado
   dentro de la app). Cuando se publique la app con un backend/hosting real, este mismo cálculo se puede
   conectar a un envío de correo automático diario de verdad. */
function finDeMes(fechaISO){
  const [y,m] = fechaISO.split('-').map(Number);
  const last = new Date(y, m, 0); // día 0 del mes siguiente = último día del mes actual
  return isoDate(last);
}
function diasEntre(fechaInicioISO, fechaFinISO){
  const out = [];
  let d = new Date(fechaInicioISO+'T00:00:00');
  const end = new Date(fechaFinISO+'T00:00:00');
  while(d <= end){ out.push(isoDate(d)); d.setDate(d.getDate()+1); }
  return out;
}
function weekdayIdxFromISO(fechaISO){ // 0=lunes..5=sábado, -1=domingo (sin agenda)
  const js = new Date(fechaISO+'T00:00:00').getDay();
  return js===0 ? -1 : js-1;
}

function computeDisponibilidad(){
  const hoy = isoDate(new Date());
  const fin = finDeMes(hoy);
  const dias = diasEntre(hoy, fin);
  const semanaActual = {}; [0,1,2,3,4,5].forEach(i=>{ semanaActual[dateForWeekday(i)] = true; });
  const porProfesor = {};
  const addSlot = (profesorId, fechaISO, hora, horaFinS, motivo, cliente) => {
    (porProfesor[profesorId] = porProfesor[profesorId]||[]).push({fecha:fechaISO, hora, horaFin:horaFinS, motivo, cliente});
  };
  dias.forEach(fechaISO=>{
    const wi = weekdayIdxFromISO(fechaISO);
    if(wi<0) return;
    if(semanaActual[fechaISO]){
      // Semana en curso: usamos el estado real de cada clase (cancelaciones puntuales ya registradas).
      SCHEDULE.filter(s=>s.fecha===fechaISO).forEach(s=>{
        if(!s.clienteId && s.tipo==='Disponible'){ addSlot(s.profesorId, fechaISO, s.hora, s.horaFin, 'Bloque disponible (Drive)', null); return; }
        if(!s.clienteId) return;
        if(s.estado==='cancelada'){ addSlot(s.profesorId, fechaISO, s.hora, s.horaFin, CANCEL_META[s.tipoCancelacion]?.label||'Cancelada', clienteNombre(s.clienteId)); return; }
        const susp = suspensionActiva(s.clienteId, fechaISO);
        if(susp) addSlot(s.profesorId, fechaISO, s.hora, s.horaFin, SUSPENSION_META[susp.motivo].label, clienteNombre(s.clienteId));
      });
    } else {
      // Semanas siguientes del mes: se proyecta el mismo horario semanal (plantilla por día de la semana);
      // solo sabemos con certeza los espacios libres por una suspensión ya registrada con anticipación.
      SCHEDULE.filter(s=>s.dia===wi).forEach(s=>{
        if(!s.clienteId && s.tipo==='Disponible'){ addSlot(s.profesorId, fechaISO, s.hora, s.horaFin, 'Bloque disponible (Drive)', null); return; }
        if(!s.clienteId) return;
        const susp = suspensionActiva(s.clienteId, fechaISO);
        if(susp) addSlot(s.profesorId, fechaISO, s.hora, s.horaFin, SUSPENSION_META[susp.motivo].label, clienteNombre(s.clienteId));
      });
    }
  });
  Object.values(porProfesor).forEach(arr=>arr.sort((a,b)=> a.fecha===b.fecha ? a.hora.localeCompare(b.hora) : a.fecha.localeCompare(b.fecha)));
  return porProfesor;
}

function renderDisponibilidad(){
  const el = document.getElementById('mod-disponibilidad');
  const hoy = isoDate(new Date());
  const fin = finDeMes(hoy);
  const data = computeDisponibilidad();
  const totalSlots = Object.values(data).reduce((a,arr)=>a+arr.length,0);

  el.innerHTML = `
    <div class="card fade-up" style="padding:16px 18px;margin-bottom:20px;display:flex;gap:12px;align-items:flex-start;background:var(--teal-light);border:none;">

      <div style="font-size:12.5px;color:var(--teal-dark);line-height:1.6;">
        Vista previa de cómo se vería el correo diario de disponibilidad. Por ahora se ve aquí en la app — cuando la publiquemos con un servidor real, este mismo cálculo se puede conectar para que te llegue por correo automáticamente todos los días. El botón de abajo simula ese envío.
      </div>
    </div>
    <div class="fade-up" style="display:flex;flex-wrap:wrap;gap:12px;align-items:center;justify-content:space-between;margin-bottom:12px;">
      <div class="card" style="padding:12px 16px;display:flex;gap:10px;align-items:center;">
        <span style="width:17px;height:17px;color:var(--accent);display:inline-flex">${ICONS.calendar}</span>
        <span style="font-size:13.5px;font-weight:600;">Disponibilidad desde hoy (${fmtFechaCorta(hoy)}) hasta fin de mes (${fmtFechaCorta(fin)})</span>
      </div>
      <button class="btn btn-primary btn-sm" id="btnEnviarDisponibilidad"><span style="width:14px;height:14px;display:inline-flex">${ICONS.mail}</span>Simular envío por correo</button>
    </div>
    <div class="card" style="padding:12px 14px;margin-bottom:16px;background:var(--paper-dim);border:none;font-size:12px;color:var(--ink-fade);">
      Los días de la semana en curso usan las cancelaciones y suspensiones reales ya registradas. Los días de semanas siguientes dentro del mes se proyectan asumiendo que el horario semanal de cada profesor se repite igual — ahí solo se muestran los espacios que ya sabemos con certeza que van a quedar libres por una suspensión registrada con anticipación (no se pueden adivinar cancelaciones puntuales que todavía no han pasado).
    </div>
    ${totalSlots===0 ? `<div class="card" style="padding:40px;text-align:center;color:var(--ink-fade);">No hay espacios disponibles por cancelaciones ni suspensiones en lo que resta del mes.</div>` :
      PROFESORES.map(p=>{
        const slots = data[p.id]||[];
        if(!slots.length) return '';
        return `
        <div class="card fade-up" style="padding:16px 18px;margin-bottom:14px;">
          <div style="font-weight:800;font-size:14.5px;margin-bottom:10px;">${p.nombre} <span class="pill pill-teal" style="font-size:10.5px;margin-left:6px;">${slots.length} espacio${slots.length===1?'':'s'}</span></div>
          <div style="display:flex;flex-direction:column;gap:8px;">
            ${slots.map(sl=>`
              <div style="display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid var(--line);">
                <div style="width:130px;flex-shrink:0;font-size:12.5px;font-weight:700;">${fmtFechaCorta(sl.fecha)}</div>
                <div style="width:100px;flex-shrink:0;font-size:12.5px;font-weight:700;color:var(--success);">${sl.hora}${sl.horaFin?'–'+sl.horaFin:''}</div>
                <div style="flex:1;font-size:12.5px;color:var(--ink-fade);">${sl.motivo}${sl.cliente?' · antes: '+sl.cliente:''}</div>
              </div>`).join('')}
          </div>
        </div>`;
      }).join('')
    }
  `;
  document.getElementById('btnEnviarDisponibilidad').addEventListener('click', ()=>{
    toast('Correo de disponibilidad enviado a anderssonpersonaltrainer@gmail.com (simulado)', 'success');
    NOTIFICACIONES.unshift({id:'n'+Date.now(), titulo:'Disponibilidad enviada', cuerpo:`Reporte de disponibilidad del ${fmtFechaCorta(hoy)} al ${fmtFechaCorta(fin)} enviado a administrador.`, hora:'Ahora', leido:false});
    renderNotifDrawer();
    saveState();
  });
}

    <div class="fade-up" style="display:flex;flex-wrap:wrap;gap:12px;align-items:center;justify-content:space-between;margin-bottom:18px;">
      <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;">
        <div style="position:relative;min-width:240px;">
          <span style="position:absolute;left:12px;top:50%;transform:translateY(-50%);width:14px;height:14px;color:var(--ink-fade);display:inline-flex">${ICONS.search}</span>
          <input type="text" id="regClienteSearch" placeholder="Escribe el nombre del cliente…" value="${registroClienteSearch}" autocomplete="off" style="padding:10px 12px 10px 34px;border:1.5px solid var(--line);border-radius:100px;background:#fff;font-size:13px;width:100%;">
          ${q ? `
          <div id="regClienteResultados" class="card" style="position:absolute;top:calc(100% + 4px);left:0;right:0;z-index:30;max-height:230px;overflow-y:auto;padding:4px;box-shadow:var(--shadow-md);">
